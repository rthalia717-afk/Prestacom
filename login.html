<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTACOM - Iniciar Sesión</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6600">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top right, #2a1b10 0%, #0f172a 60%, #020617 100%); color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 24px; }
        .login-container { width: 100%; max-width: 410px; background: rgba(30, 41, 59, 0.45); backdrop-filter: blur(16px); padding: 40px 32px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.08); text-align: center; }
        .logo-placeholder { width: 76px; height: 76px; background: rgba(255, 102, 0, 0.2); color: #FF7A1A; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; font-size: 2.4rem; border: 1px solid rgba(255, 102, 0, 0.3); }
        h1 { font-size: 1.8rem; font-weight: 800; color: #ffffff; margin-bottom: 32px; }
        .form-group { text-align: left; margin-bottom: 22px; }
        label { font-size: 0.85rem; font-weight: 600; color: #cbd5e1; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 14px 16px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; background: rgba(15, 23, 42, 0.6); color: #ffffff; }
        .btn-login { width: 100%; background: linear-gradient(135deg, #FF7A1A 0%, #E05500 100%); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 12px; transition: opacity 0.3s; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-message { color: #ff8585; font-size: 0.85rem; margin-top: 14px; background: rgba(239, 68, 68, 0.15); padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-placeholder">💼</div>
        <h1>PRESTACOM</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
            </div>
            <div class="error-message" id="error-txt"></div>
            <button type="submit" class="btn-login" id="btn-submit">Ingresar al Sistema</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
            authDomain: "prestacom-sistema-a2830.firebaseapp.com",
            projectId: "prestacom-sistema-a2830",
            storageBucket: "prestacom-sistema-a2830.firebasestorage.app",
            messagingSenderId: "500739174929",
            appId: "1:500739174929:web:1694f07bf65714606f77b0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const btnSubmit = document.getElementById('btn-submit');
        const errorTxt = document.getElementById('error-txt');

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Validando acceso...";
            errorTxt.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const userDoc = await getDoc(doc(db, "perfiles", userCredential.user.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    // GUARDAMOS LOS DATOS EN LOCALSTORAGE PARA QUE EL PANEL LOS RECONOZCA
                    localStorage.setItem('id_empresa', userData.id_empresa || 'general');
                    localStorage.setItem('rol_usuario', userData.rol || 'Administrador');
                    localStorage.setItem('nombre_company', userData.nombre || 'Mi Empresa');

                    console.log("Redirigiendo a panel...");
                    window.location.replace("panel.html");
                } else {
                    await auth.signOut();
                    throw new Error("Usuario sin perfil registrado.");
                }
            } catch (error) {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Ingresar al Sistema";
                errorTxt.style.display = 'block';
                errorTxt.innerText = error.code === 'auth/invalid-credential' 
                    ? "Correo o contraseña incorrectos." 
                    : "Error: " + error.message;
            }
        });
    </script>
</body>
</html>
