<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESA FÁCIL - Iniciar Sesión</title>
    
    <!-- PWA AGREGADO -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6600">
    <!-- FIN PWA -->

    <link rel="stylesheet" href="css/variable.css">
    
    <style>
        /* RESET & BASE SYSTEM */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Fondo futurista con degradado profundo */
            background: radial-gradient(circle at top right, #2a1b10 0%, #0f172a 60%, #020617 100%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Decoraciones de luz de fondo (Efecto Glow) */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: #FF6600;
            filter: blur(120px);
            opacity: 0.15;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        /* GLASSMORPHISM CONTAINER */
        .login-container {
            width: 100%;
            max-width: 410px;
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px 32px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            text-align: center;
            z-index: 1;
            transition: transform 0.3s ease;
        }

        /* ICONO GLOW */
        .logo-placeholder {
            width: 76px;
            height: 76px;
            background: linear-gradient(135deg, rgba(255, 102, 0, 0.2) 0%, rgba(255, 102, 0, 0.05) 100%);
            color: #FF7A1A;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            font-size: 2.4rem;
            border: 1px solid rgba(255, 102, 0, 0.3);
            box-shadow: 0 8px 24px rgba(255, 102, 0, 0.15);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 32px;
            font-weight: 400;
        }

        /* FORMULARIOS PREMIUM */
        .form-group {
            text-align: left;
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            padding-left: 2px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 0.95rem;
            background-color: rgba(15, 23, 42, 0.6);
            color: #ffffff;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        input::placeholder {
            color: #475569;
        }

        input:focus {
            outline: none;
            border-color: #FF6600;
            background-color: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(255, 102, 0, 0.15), 
                        inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* BOTÓN PRINCIPAL (CANDELA PURA) */
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #FF7A1A 0%, #E05500 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.3);
            margin-top: 12px;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 102, 0, 0.4);
            filter: brightness(1.1);
        }

        .btn-login:active {
            transform: translateY(0px);
            filter: brightness(0.9);
        }

        .btn-login:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
            transform: translateY(0);
        }

        /* BOTÓN DEMO DE INVITADO (ELEGANTE) */
        .btn-demo {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.03);
            color: #94a3b8;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            padding: 13px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 18px;
            transition: all 0.2s ease;
        }

        .btn-demo:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }

        /* BOTÓN INSTALAR PWA (NUEVO) */
        #btn-install {
            width: 100%;
            background: transparent;
            color: #FF6600;
            border: 1px solid #FF6600;
            padding: 13px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 18px;
            display: none; /* Se muestra vía JS */
            transition: all 0.2s ease;
        }

        #btn-install:hover {
            background: rgba(255, 102, 0, 0.1);
        }

        /* MENSAJE DE ERROR MODERNO */
        .error-message {
            color: #ff8585;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 14px;
            background-color: rgba(239, 68, 68, 0.15);
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.25);
            display: none;
            text-align: left;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* SECCIÓN CRÉDITOS PREMIUM */
        .credits-container {
            margin-top: 40px;
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            line-height: 1.7;
            z-index: 1;
        }

        .credits-container .version {
            font-weight: 700;
            color: #94a3b8;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .credits-container .owner {
            font-weight: 600;
            color: #cbd5e1;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        <div class="logo-placeholder">💼</div>
        <h1>PRESA FÁCIL</h1>
        <p class="subtitle">Fintech Control System</p>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="nombre@correo.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <div class="error-message" id="error-txt">Correo o contraseña incorrectos.</div>

            <button type="submit" class="btn-login" id="btn-submit">Ingresar al Sistema</button>
            
            <button type="button" class="btn-demo" id="btn-guest">✨ Explorar Demo de Prueba</button>

            <!-- BOTÓN PWA AGREGADO -->
            <button type="button" id="btn-install">📥 Instalar Aplicación</button>
        </form>
    </div>

    <div class="credits-container">
        <span class="version">Secure v2.0.0</span><br>
        <span>© 2026 Todos los derechos reservados.</span><br>
        <span>Desarrollado para: <span class="owner">Presa Fácil</span></span>
    </div>

    <script type="module">
        // --- CÓDIGO PWA ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                .catch(err => console.log('SW error:', err));
            });
        }

        let deferredPrompt;
        const btnInstall = document.getElementById('btn-install');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btnInstall.style.display = 'block';
        });

        btnInstall.addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                });
            }
        });
        // --- FIN PWA ---

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5oHQtFWzLqY3JdpV_3pKY40rx00o6Gu4",
            authDomain: "prestacom-36ebd.firebaseapp.com",
            projectId: "prestacom-36ebd",
            storageBucket: "prestacom-36ebd.firebasestorage.app",
            messagingSenderId: "787618813060",
            appId: "1:787618813060:web:8bbdc1bea7960cdbad5ed1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorTxt = document.getElementById('error-txt');
            const btnSubmit = document.getElementById('btn-submit');
            
            errorTxt.style.display = 'none';
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<span style="opacity: 0.7;">Autenticando...</span>`;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userDocRef = doc(db, "usuarios_empleados", user.uid);
                const userDoc = await getDoc(userDocRef);

                if (userDoc.exists()) {
                    const userData = userDoc.data();

                    if (userData.activo === false) {
                        errorTxt.innerText = "Acceso denegado: Este usuario ha sido deshabilitado.";
                        errorTxt.style.display = 'block';
                        btnSubmit.disabled = false;
                        btnSubmit.innerText = "Ingresar al Sistema";
                        return; 
                    }

                    localStorage.setItem('id_empresa', userData.id_empresa);
                    localStorage.setItem('nombre_usuario', userData.nombre);
                    localStorage.setItem('rol_usuario', userData.rol);

                    window.location.href = "index.html";
                } else {
                    errorTxt.innerText = "Error: El perfil de usuario no existe en la base de datos.";
                    errorTxt.style.display = 'block';
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = "Ingresar al Sistema";
                }

            } catch (error) {
                console.error("Error en Login:", error.code);
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Ingresar al Sistema";

                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    errorTxt.innerText = "Correo o contraseña incorrectos.";
                } else {
                    errorTxt.innerText = "Error de conexión. Verifica tu internet.";
                }
                errorTxt.style.display = 'block';
            }
        });

        document.getElementById('btn-guest').addEventListener('click', () => {
            localStorage.setItem('id_empresa', 'empresa_demo_general');
            localStorage.setItem('nombre_usuario', 'Inversionista de Prueba');
            localStorage.setItem('rol_usuario', 'administrador');
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
