<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESA FÁCIL - Iniciar Sesión</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6600">
    <link rel="stylesheet" href="css/variable.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top right, #2a1b10 0%, #0f172a 60%, #020617 100%); color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 24px; }
        .login-container { width: 100%; max-width: 410px; background: rgba(30, 41, 59, 0.45); backdrop-filter: blur(16px); padding: 40px 32px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.08); text-align: center; }
        .logo-placeholder { width: 76px; height: 76px; background: rgba(255, 102, 0, 0.2); color: #FF7A1A; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; font-size: 2.4rem; border: 1px solid rgba(255, 102, 0, 0.3); }
        h1 { font-size: 1.8rem; font-weight: 800; color: #ffffff; margin-bottom: 32px; }
        .form-group { text-align: left; margin-bottom: 22px; }
        label { font-size: 0.85rem; font-weight: 600; color: #cbd5e1; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 14px 16px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; background: rgba(15, 23, 42, 0.6); color: #ffffff; }
        .btn-login { width: 100%; background: linear-gradient(135deg, #FF7A1A 0%, #E05500 100%); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 12px; }
        .error-message { color: #ff8585; font-size: 0.85rem; margin-top: 14px; background: rgba(239, 68, 68, 0.15); padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-placeholder">💼</div>
        <h1>PRESA FÁCIL</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
            </div>
            <div class="error-message" id="error-txt">Credenciales incorrectas.</div>
            <button type="submit" class="btn-login" id="btn-submit">Ingresar al Sistema</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- PEGA AQUÍ TU CONFIGURACIÓN DE LA CONSOLA DE FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyDlVPO8P6oceu2RyVZA_bjak7bvAEXxvQk",
  authDomain: "prestacom-sistema.firebaseapp.com",
  projectId: "prestacom-sistema",
  storageBucket: "prestacom-sistema.firebasestorage.app",
  messagingSenderId: "263392324772",
  appId: "1:263392324772:web:2d83308890ddaef7e84a31"
};
        

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorTxt = document.getElementById('error-txt');
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const userDoc = await getDoc(doc(db, "perfiles", userCredential.user.uid));
                
                if (userDoc.exists()) {
                    window.location.href = "index.html";
                } else {
                    throw new Error("Perfil no encontrado");
                }
            } catch (error) {
                console.error(error);
                errorTxt.style.display = 'block';
                errorTxt.innerText = "Error: " + error.message;
            }
        });
    </script>
</body>
</html>
