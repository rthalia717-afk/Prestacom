<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTACOM 2.0 - Nuevo Préstamo</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: white;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1e293b;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
        }

        header a {
            color: white;
            text-decoration: none;
            font-size: 20px;
        }

        header h1 {
            font-size: 18px;
        }

        form {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 15px;
        }

        .title {
            font-size: 14px;
            font-weight: bold;
            color: #ff6600;
            margin-bottom: 10px;
        }

        label {
            font-size: 13px;
            margin-bottom: 5px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #ff6600;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .cliente-box {
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <header>
        <a href="index.html">⬅</a>
        <h1>Nuevo Préstamo</h1>
    </header>

    <form id="form-prestamo">

        <!-- CLIENTE -->
        <div class="card">
            <div class="title">Cliente</div>

            <label>Buscar Cliente (Cédula o Nombre)</label>
            <input type="text" id="buscar_cliente" placeholder="Ej: 001-1234567 o Juan Pérez">

            <div class="cliente-box" id="cliente_info">
                Cliente no seleccionado
            </div>

            <input type="hidden" id="cliente_id">
        </div>

        <!-- PRESTAMO -->
        <div class="card">
            <div class="title">Datos del Préstamo</div>

            <label>Monto del Préstamo</label>
            <input type="number" id="monto" required>

            <label>Interés (%)</label>
            <input type="number" id="interes" value="0" required>

            <label>Modalidad</label>
            <select id="modalidad" required>
                <option value="diario">Diario</option>
                <option value="semanal">Semanal</option>
                <option value="quincenal">Quincenal</option>
                <option value="mensual">Mensual</option>
            </select>

            <label>Cantidad de Cuotas</label>
            <input type="number" id="cuotas" required>

            <label>Fecha de Inicio</label>
            <input type="date" id="fecha_inicio" required>
        </div>

        <!-- RESUMEN -->
        <div class="card">
            <div class="title">Resumen</div>

            <p><b>Total a Pagar:</b> <span id="total_pago">0</span></p>
            <p><b>Pago por Cuota:</b> <span id="pago_cuota">0</span></p>
        </div>

        <button type="submit" class="btn">Guardar Préstamo</button>

    </form>

</div>

<script>
    const monto = document.getElementById("monto");
    const interes = document.getElementById("interes");
    const cuotas = document.getElementById("cuotas");

    function calcular() {
        let m = parseFloat(monto.value) || 0;
        let i = parseFloat(interes.value) || 0;
        let c = parseInt(cuotas.value) || 1;

        let total = m + (m * i / 100);
        let pago = total / c;

        document.getElementById("total_pago").innerText = total.toFixed(2);
        document.getElementById("pago_cuota").innerText = pago.toFixed(2);
    }

    monto.addEventListener("input", calcular);
    interes.addEventListener("input", calcular);
    cuotas.addEventListener("input", calcular);
</script>

</body>
</html>
