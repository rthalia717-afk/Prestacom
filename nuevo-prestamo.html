<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTACOM 2.0 - Nuevo Préstamo</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
        body { background:#f1f5f9; display:flex; justify-content:center; }
        .container { width:100%; max-width:480px; background:#fff; min-height:100vh; padding-bottom: 20px; }
        header { background:#1e293b; color:#fff; padding:15px; display:flex; gap:10px; align-items:center; position:sticky; top:0; z-index:100; }
        header a { color:#fff; text-decoration:none; font-size:20px; }
        form { padding:15px; display:flex; flex-direction:column; gap:15px; }
        .card { border:1px solid #e5e7eb; border-radius:10px; padding:12px; background:#f8fafc; }
        label { font-size:13px; display:block; margin-bottom:5px; font-weight:bold; }
        input, select { width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; font-size: 16px; }
        .cliente-box { background:#fff; padding:10px; border-radius:8px; font-size:13px; border:1px solid #ddd; margin-top:5px; min-height: 50px; }
        button { width:100%; padding:14px; background:#ff6600; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size: 16px; }
        button:disabled { background:#cbd5e1; cursor:not-allowed; }
        .resumen { font-size:14px; background:#fff; padding:10px; border-radius:8px; border:1px solid #ff6600; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="index.html">⬅</a>
        <h1>Nuevo Préstamo</h1>
    </header>

    <form id="form">
        <!-- BUSCADOR HÍBRIDO -->
        <div class="card">
            <label>Buscar Cliente (Nombre o ID)</label>
            <input type="text" id="buscar" placeholder="Ej: Juan o CLI-123456" autofocus>
            <div class="cliente-box" id="clienteBox">Escribe para buscar...</div>
            <input type="hidden" id="cliente_id">
            <input type="hidden" id="cliente_nombre">
        </div>

        <!-- DATOS PRESTAMO -->
        <div class="card">
            <label>Monto</label> <input type="number" id="monto" required>
            <label>Interés (%)</label> <input type="number" id="interes" value="20">
            <label>Modalidad</label>
            <select id="modalidad">
                <option value="diario">Diario</option>
                <option value="semanal">Semanal</option>
                <option value="quincenal">Quincenal</option>
                <option value="mensual">Mensual</option>
            </select>
            <label>Cuotas</label> <input type="number" id="cuotas" required>
            <label>Fecha inicio</label> <input type="date" id="fecha" required>
        </div>

        <!-- RESUMEN -->
        <div class="card resumen">
            <p><b>Total a pagar:</b> RD$ <span id="total">0.00</span></p>
            <p><b>Cuota:</b> RD$ <span id="cuota">0.00</span></p>
        </div>

        <button type="submit" id="btn-guardar" disabled>Guardar Préstamo</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
        authDomain: "prestacom-sistema-a2830.firebaseapp.com",
        projectId: "prestacom-sistema-a2830",
        storageBucket: "prestacom-sistema-a2830.appspot.com",
        messagingSenderId: "500739174929",
        appId: "1:500739174929:web:1694f07bf65714606f77b0"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const idEmpresa = localStorage.getItem("id_empresa");

    // Fecha hoy
    document.getElementById('fecha').value = new Date().toISOString().split('T')[0];

    // Búsqueda Híbrida
    const buscar = document.getElementById("buscar");
    const clienteBox = document.getElementById("clienteBox");
    const btnGuardar = document.getElementById("btn-guardar");

    buscar.addEventListener("input", async (e) => {
        const val = e.target.value.trim().toUpperCase();
        if (val.length < 3) {
            clienteBox.innerHTML = "Escribe al menos 3 caracteres...";
            return;
        }

        const q = query(collection(db, "clientes_prestamo"), where("id_empresa", "==", idEmpresa));
        const snap = await getDocs(q);

        let encontrado = false;
        snap.forEach(doc => {
            const c = doc.data();
            if (c.nombre.toUpperCase().includes(val) || c.numero_cliente.toUpperCase().includes(val)) {
                encontrado = true;
                clienteBox.innerHTML = `
                    <div style="padding: 10px; border: 1px solid #ff6600; border-radius: 8px;">
                        <b>${c.nombre}</b> <br>
                        <small>ID: ${c.numero_cliente}</small><br>
                        <button type="button" style="margin-top:5px; background:#22c55e; color:white; border:none; padding:8px; border-radius:5px; width:100%" 
                                onclick="window.seleccionarCliente('${doc.id}','${c.nombre}')">
                            Seleccionar
                        </button>
                    </div>
                `;
            }
        });
        if (!encontrado) clienteBox.innerHTML = "No se encontró.";
    });

    window.seleccionarCliente = (id, nombre) => {
        document.getElementById("cliente_id").value = id;
        document.getElementById("cliente_nombre").value = nombre;
        clienteBox.innerHTML = `<b style="color:green">✓ ${nombre} seleccionado</b>`;
        btnGuardar.disabled = false;
    };

    // Cálculos
    function calcular() {
        let m = parseFloat(document.getElementById("monto").value) || 0;
        let i = parseFloat(document.getElementById("interes").value) || 0;
        let c = parseInt(document.getElementById("cuotas").value) || 1;
        let total = m + (m * i / 100);
        document.getElementById("total").innerText = total.toFixed(2);
        document.getElementById("cuota").innerText = (total / c).toFixed(2);
    }
    ["monto","interes","cuotas"].forEach(id => document.getElementById(id).addEventListener("input", calcular));

    // Guardar
    document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        btnGuardar.disabled = true;
        btnGuardar.innerText = "Guardando...";

        const data = {
            id_empresa: idEmpresa,
            cliente_id: document.getElementById("cliente_id").value,
            cliente_nombre: document.getElementById("cliente_nombre").value,
            monto: parseFloat(document.getElementById("monto").value),
            total: parseFloat(document.getElementById("total").innerText),
            cuota: parseFloat(document.getElementById("cuota").innerText),
            fecha_inicio: document.getElementById("fecha").value,
            estado: "activo",
            fecha_creacion: new Date().toISOString()
        };

        await addDoc(collection(db, "prestamos"), data);
        alert("¡Préstamo registrado!");
        window.location.href = "index.html";
    });
</script>

</body>
</html>
