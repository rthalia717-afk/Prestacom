<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTACOM 2.0 - Nuevo Préstamo</title>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

        body {
            background:#f1f5f9;
            display:flex;
            justify-content:center;
        }

        .container {
            width:100%;
            max-width:480px;
            background:#fff;
            min-height:100vh;
        }

        header {
            background:#1e293b;
            color:#fff;
            padding:15px;
            display:flex;
            gap:10px;
            align-items:center;
            position:sticky;
            top:0;
        }

        header a {
            color:#fff;
            text-decoration:none;
            font-size:20px;
        }

        h1 { font-size:18px; }

        form { padding:15px; display:flex; flex-direction:column; gap:15px; }

        .card {
            border:1px solid #e5e7eb;
            border-radius:10px;
            padding:12px;
            background:#f8fafc;
        }

        label { font-size:13px; display:block; margin-bottom:5px; }

        input, select {
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        .cliente-box {
            background:#fff;
            padding:10px;
            border-radius:8px;
            font-size:13px;
            border:1px solid #ddd;
        }

        button {
            width:100%;
            padding:12px;
            background:#ff6600;
            color:#fff;
            border:none;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
        }

        .resumen {
            font-size:13px;
            background:#fff;
            padding:10px;
            border-radius:8px;
        }
    </style>
</head>

<body>

<div class="container">

<header>
    <a href="index.html">⬅</a>
    <h1>Nuevo Préstamo</h1>
</header>

<form id="form">

    <!-- CLIENTE -->
    <div class="card">
        <label>Buscar Cliente (Cédula o Nombre)</label>
        <input type="text" id="buscar">

        <div class="cliente-box" id="clienteBox">
            Ningún cliente seleccionado
        </div>

        <input type="hidden" id="cliente_id">
        <input type="hidden" id="cliente_nombre">
    </div>

    <!-- PRESTAMO -->
    <div class="card">
        <label>Monto</label>
        <input type="number" id="monto">

        <label>Interés (%)</label>
        <input type="number" id="interes" value="0">

        <label>Modalidad</label>
        <select id="modalidad">
            <option value="diario">Diario</option>
            <option value="semanal">Semanal</option>
            <option value="quincenal">Quincenal</option>
            <option value="mensual">Mensual</option>
        </select>

        <label>Cuotas</label>
        <input type="number" id="cuotas">

        <label>Fecha inicio</label>
        <input type="date" id="fecha">
    </div>

    <!-- RESUMEN -->
    <div class="card resumen">
        <p><b>Total:</b> <span id="total">0</span></p>
        <p><b>Cuota:</b> <span id="cuota">0</span></p>
    </div>

    <button type="submit">Guardar Préstamo</button>

</form>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import {
    getFirestore,
    collection,
    query,
    where,
    getDocs,
    addDoc
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
    authDomain: "prestacom-sistema-a2830.firebaseapp.com",
    projectId: "prestacom-sistema-a2830",
    storageBucket: "prestacom-sistema-a2830.appspot.com",
    messagingSenderId: "500739174929",
    appId: "1:500739174929:web:1694f07bf65714606f77b0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const idEmpresa = localStorage.getItem("id_empresa");
if (!idEmpresa) window.location.href = "login.html";

// ---------------- CLIENTE SEARCH ----------------
const buscar = document.getElementById("buscar");
const clienteBox = document.getElementById("clienteBox");

buscar.addEventListener("input", async () => {
    const val = buscar.value.trim();
    if (val.length < 3) return;

    const q = query(
        collection(db, "clientes_prestamo"),
        where("id_empresa", "==", idEmpresa)
    );

    const snap = await getDocs(q);

    snap.forEach(doc => {
        const c = doc.data();

        if (
            c.nombre.toLowerCase().includes(val.toLowerCase()) ||
            c.cedula.includes(val)
        ) {
            clienteBox.innerHTML = `
                <b>${c.nombre}</b><br>
                ${c.cedula}
                <button type="button" onclick="seleccionarCliente('${doc.id}','${c.nombre}')">
                    Seleccionar
                </button>
            `;
        }
    });
});

// seleccionar cliente
window.seleccionarCliente = (id, nombre) => {
    document.getElementById("cliente_id").value = id;
    document.getElementById("cliente_nombre").value = nombre;
    clienteBox.innerHTML = "Cliente: " + nombre;
};

// ---------------- CALCULO ----------------
function calcular() {
    let m = parseFloat(document.getElementById("monto").value) || 0;
    let i = parseFloat(document.getElementById("interes").value) || 0;
    let c = parseInt(document.getElementById("cuotas").value) || 1;

    let total = m + (m * i / 100);
    let cuota = total / c;

    document.getElementById("total").innerText = total.toFixed(2);
    document.getElementById("cuota").innerText = cuota.toFixed(2);
}

["monto","interes","cuotas"].forEach(id=>{
    document.getElementById(id).addEventListener("input", calcular);
});

// ---------------- GUARDAR ----------------
document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        id_empresa: idEmpresa,
        cliente_id: document.getElementById("cliente_id").value,
        cliente_nombre: document.getElementById("cliente_nombre").value,
        monto: parseFloat(document.getElementById("monto").value),
        interes: parseFloat(document.getElementById("interes").value),
        modalidad: document.getElementById("modalidad").value,
        cuotas: parseInt(document.getElementById("cuotas").value),
        cuotas_pagadas: 0,
        fecha_inicio: document.getElementById("fecha").value,
        total: parseFloat(document.getElementById("total").innerText),
        cuota: parseFloat(document.getElementById("cuota").innerText),
        estado: "activo",
        pagado_hoy: false,
        fecha_creacion: new Date().toISOString()
    };

    await addDoc(collection(db, "prestamos"), data);

    alert("Préstamo guardado");
    window.location.href = "index.html";
});
</script>

</body>
</html>
