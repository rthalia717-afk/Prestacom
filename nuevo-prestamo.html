<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTACOM 2.0 - Nuevo Préstamo</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        body { background:#f1f5f9; display:flex; justify-content:center; }
        .container { width:100%; max-width:480px; background:#fff; min-height:100vh; }
        header { background:#1e293b; color:#fff; padding:15px; display:flex; gap:10px; align-items:center; position:sticky; top:0; }
        header a { color:#fff; text-decoration:none; font-size:20px; }
        form { padding:15px; display:flex; flex-direction:column; gap:15px; }
        .card { border:1px solid #e5e7eb; border-radius:10px; padding:12px; background:#f8fafc; }
        label { font-size:13px; display:block; margin-bottom:5px; font-weight:bold; }
        input, select { width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; }
        .cliente-box { background:#fff; padding:10px; border-radius:8px; font-size:13px; border:1px solid #ddd; margin-top:5px; }
        button { width:100%; padding:12px; background:#ff6600; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
        button:disabled { background:#cbd5e1; cursor:not-allowed; }
        .resumen { font-size:14px; background:#fff; padding:10px; border-radius:8px; border:1px solid #ff6600; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <a href="index.html">⬅</a>
        <h1>Nuevo Préstamo</h1>
    </header>
    <form id="form">
        <div class="card">
            <label>Buscar Cliente (Escribe CLI-XXXXXX)</label>
            <input type="text" id="buscar" placeholder="Ej: CLI-123456" autofocus>
            <div class="cliente-box" id="clienteBox">Esperando cliente...</div>
            <input type="hidden" id="cliente_id">
            <input type="hidden" id="cliente_nombre">
        </div>
        <div class="card">
            <label>Monto</label> <input type="number" id="monto" required>
            <label>Interés (%)</label> <input type="number" id="interes" value="20">
            <label>Modalidad</label>
            <select id="modalidad">
                <option value="diario">Diario</option>
                <option value="semanal">Semanal</option>
            </select>
            <label>Cuotas</label> <input type="number" id="cuotas" required>
            <label>Fecha inicio</label> <input type="date" id="fecha" required>
        </div>
        <div class="card resumen">
            <p><b>Total a pagar:</b> RD$ <span id="total">0.00</span></p>
            <p><b>Cuota:</b> RD$ <span id="cuota">0.00</span></p>
        </div>
        <button type="submit" id="btn-guardar" disabled>Guardar Préstamo</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = { /* Tus datos de Firebase aquí */ };
    const db = getFirestore(initializeApp(firebaseConfig));
    const idEmpresa = localStorage.getItem("id_empresa");

    // Fecha hoy automática
    document.getElementById('fecha').value = new Date().toISOString().split('T')[0];

    // Búsqueda rápida
    document.getElementById("buscar").addEventListener("input", async (e) => {
        const val = e.target.value.trim().toUpperCase();
        if (val.length < 5) return;

        const q = query(collection(db, "clientes_prestamo"), where("numero_cliente", "==", val));
        const snap = await getDocs(q);

        if (!snap.empty) {
            const doc = snap.docs[0];
            const c = doc.data();
            document.getElementById("clienteBox").innerHTML = `<b>${c.nombre}</b><br><span style="color:green">Cliente validado ✓</span>`;
            document.getElementById("cliente_id").value = doc.id;
            document.getElementById("cliente_nombre").value = c.nombre;
            document.getElementById("btn-guardar").disabled = false; // Habilitamos el botón
        } else {
            document.getElementById("clienteBox").innerHTML = "No existe este código.";
            document.getElementById("btn-guardar").disabled = true;
        }
    });

    // Cálculo dinámico
    function calcular() {
        let m = parseFloat(document.getElementById("monto").value) || 0;
        let i = parseFloat(document.getElementById("interes").value) || 0;
        let c = parseInt(document.getElementById("cuotas").value) || 1;
        let total = m + (m * i / 100);
        document.getElementById("total").innerText = total.toFixed(2);
        document.getElementById("cuota").innerText = (total / c).toFixed(2);
    }
    ["monto","interes","cuotas"].forEach(id => document.getElementById(id).addEventListener("input", calcular));

    // Guardar
    document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btn-guardar");
        btn.innerText = "Guardando...";
        btn.disabled = true;

        const data = {
            id_empresa: idEmpresa,
            cliente_id: document.getElementById("cliente_id").value,
            cliente_nombre: document.getElementById("cliente_nombre").value,
            monto: parseFloat(document.getElementById("monto").value),
            total: parseFloat(document.getElementById("total").innerText),
            cuota: parseFloat(document.getElementById("cuota").innerText),
            fecha_inicio: document.getElementById("fecha").value,
            estado: "activo",
            fecha_creacion: new Date().toISOString()
        };

        await addDoc(collection(db, "prestamos"), data);
        alert("¡Préstamo registrado correctamente!");
        window.location.href = "index.html";
    });
</script>
</body>
</html>
