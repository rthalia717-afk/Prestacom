<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PRESA-FACIL - Cobros Semanales</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        body { background:#f1f5f9; display:flex; justify-content:center; }
        .container { width:100%; max-width:480px; min-height:100vh; background:#fff; }
        .card { background:#f8fafc; border:1px solid #e5e7eb; border-radius:10px; padding:15px; margin: 10px; }
        .status { font-size:12px; padding:4px 10px; border-radius:20px; background:#facc15; font-weight:bold; }
        .status.paid { background:#22c55e; color:#fff; }
        button { width:100%; padding:12px; border:none; border-radius:8px; background:#1e293b; color:#fff; font-weight:bold; cursor:pointer; }
    </style>
</head>

<body>
<div class="container" id="lista"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // [SECCIÓN CONFIGURACIÓN]: Configuración de Firebase
    const firebaseConfig = {
        apiKey:"AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
        authDomain: "prestacom-sistema-a2830.firebaseapp.com",
        projectId: "prestacom-sistema-a2830",
        storageBucket: "prestacom-sistema-a2830.appspot.com",
        messagingSenderId: "500739174929",
        appId: "1:500739174929:web:1694f07bf65714606f77b0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const idEmpresa = localStorage.getItem("id_empresa");

    // [SECCIÓN CONSULTA]: Obtención de datos filtrados
    const q = query(collection(db, "prestamos"), where("id_empresa", "==", idEmpresa), where("estado", "==", "activo"));

    onSnapshot(q, (snapshot) => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";
        
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const div = document.createElement("div");
            div.className = "card";

            // [SECCIÓN RENDER]: Creación de la tarjeta HTML
            div.innerHTML = `
                <div class="name">${data.cliente_nombre || "Sin nombre"}</div>
                <div class="status ${data.pagado_hoy ? 'paid' : ''}">${data.pagado_hoy ? "Pagado Hoy" : "Pendiente"}</div>
                <input type="number" value="${data.cuota || 0}" class="input-pago">
                <button>${data.pagado_hoy ? "Registrar Otro Pago" : "Marcar Pago"}</button>
            `;

            // [SECCIÓN LÓGICA]: Procesamiento del Pago
            div.querySelector("button").addEventListener("click", async () => {
                const montoPagado = parseFloat(div.querySelector(".input-pago").value);
                if (isNaN(montoPagado) || montoPagado <= 0) return alert("Monto inválido");

                const nuevoBalance = (data.total || 0) - montoPagado;
                const nuevasCuotas = (data.cuotas_pagadas || 0) + 1;

                // Registro en historial de pagos
                await addDoc(collection(db, "pagos"), {
                    id_prestamo: docSnap.id,
                    monto_pagado: montoPagado,
                    fecha: new Date().toISOString()
                });

                // Actualización del préstamo
                await updateDoc(doc(db, "prestamos", docSnap.id), {
                    total: nuevoBalance,
                    cuotas_pagadas: nuevasCuotas,
                    pagado_hoy: true
                });

                alert("Pago registrado con éxito");
            });
            lista.appendChild(div);
        });
    });
</script>
</body>
</html>
