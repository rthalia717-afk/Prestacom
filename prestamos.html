<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESA-FACIL - Préstamos</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #F9FAFB; color: #1F2937; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 480px; background-color: #F9FAFB; display: flex; flex-direction: column; }
        header { background-color: #111827; color: white; padding: 15px 20px; display: flex; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 10; }
        .back-btn { text-decoration: none; color: white; font-size: 1.5rem; margin-right: 15px; display: flex; align-items: center; }
        header h1 { font-size: 1.25rem; font-weight: bold; }
        .filter-container { display: flex; gap: 8px; padding: 15px 20px; background-color: white; border-bottom: 1px solid #E5E7EB; overflow-x: auto; position: sticky; top: 54px; z-index: 9; -ms-overflow-style: none; scrollbar-width: none; }
        .filter-btn { padding: 8px 14px; border: 1px solid #D1D5DB; background-color: #FAFAFA; border-radius: 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; color: #1F2937; white-space: nowrap; transition: all 0.2s ease; }
        .filter-btn.active { background-color: #FF6600; color: white; border-color: #FF6600; }
        .loans-list { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .loan-card { background-color: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.03); display: flex; flex-direction: column; gap: 10px; }
        .loan-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .loan-header h3 { font-size: 1.05rem; font-weight: 600; color: #111827; }
        .loan-date { font-size: 0.78rem; color: #6B7280; margin-top: 4px; line-height: 1.4; }
        .status-badge { font-size: 0.75rem; font-weight: bold; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; white-space: nowrap; }
        .status-al-dia { background-color: rgba(46, 204, 113, 0.15); color: #27AE60; }
        .status-atrasado { background-color: rgba(231, 76, 60, 0.15); color: #C0392B; }
        .status-finalizado { background-color: rgba(156, 163, 175, 0.15); color: #4B5563; }
        .loan-details { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; background-color: #FAFAFA; padding: 10px; border-radius: 8px; font-size: 0.85rem; }
        .detail-item span { display: block; color: #6B7280; font-size: 0.75rem; margin-bottom: 2px; }
        .detail-item strong { font-size: 0.95rem; color: #1F2937; }
        .detail-item .mamei-text { color: #FF6600; }
        .btn-del { background:#fee2e2; color:#b91c1c; border:none; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:0.75rem; font-weight:bold; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <a href="index.html" class="back-btn">⬅</a>
            <h1>Lista de Préstamos</h1>
        </header>

        <div class="filter-container">
            <button class="filter-btn active" id="btn-filtro-todos">Todos Activos</button>
            <button class="filter-btn" id="btn-filtro-aldia">Al Día</button>
            <button class="filter-btn" id="btn-filtro-atrasado">Atrasados</button>
            <button class="filter-btn" id="btn-filtro-finalizado">Liquidados</button>
        </div>

        <main class="loans-list" id="contenedor-prestamos">
            <p style="text-align: center; padding: 20px; color: #6B7280;">Cargando cartera de préstamos...</p>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
            authDomain: "prestacom-sistema-a2830.firebaseapp.com",
            projectId: "prestacom-sistema-a2830",
            storageBucket: "prestacom-sistema-a2830.firebasestorage.app",
            messagingSenderId: "500739174929",
            appId: "1:500739174929:web:1694f07bf65714606f77b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const idEmpresaLogueada = localStorage.getItem('id_empresa');

        if (!idEmpresaLogueada) window.location.href = "login.html";

        let filtroActual = 'todos';

        // Función para eliminar préstamo
        window.eliminarPrestamo = async (idPrestamo) => {
            if (confirm("⚠️ ¿Estás seguro de eliminar este préstamo? Esta acción es irreversible.")) {
                try {
                    await deleteDoc(doc(db, "prestamos", idPrestamo));
                    alert("Préstamo eliminado correctamente.");
                    await cargarPrestamosNube();
                } catch (error) {
                    console.error("Error al eliminar:", error);
                    alert("Hubo un error al intentar eliminar el préstamo.");
                }
            }
        };

        window.addEventListener('DOMContentLoaded', async () => {
            await cargarPrestamosNube();
            configurarFiltrosUI();
        });

        function parsearFechaString(fechaStr) {
            if (!fechaStr) return new Date();
            const partes = fechaStr.split('-');
            return new Date(partes[2], partes[1] - 1, partes[0]);
        }

        function obtenerTextoModalidad(dias) {
            const mapModalidades = { 1: 'Diario', 7: 'Semanal', 15: 'Quincenal', 30: 'Mensual' };
            return mapModalidades[dias] || `Cada ${dias} días`;
        }

        async function cargarPrestamosNube() {
            const contenedor = document.getElementById('contenedor-prestamos');
            try {
                const q = query(collection(db, "prestamos"), where("id_empresa", "==", idEmpresaLogueada));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    contenedor.innerHTML = '<p style="text-align: center; padding: 20px; color: #6B7280;">No se han registrado préstamos.</p>';
                    return;
                }

                contenedor.innerHTML = "";
                const hoy = new Date();
                hoy.setHours(0,0,0,0);

                let listaDocs = [];
                querySnapshot.forEach(doc => {
                    const data = doc.data();
                    if (data && data.nombre_cliente && data.monto_original) {
                        listaDocs.push({ id: doc.id, ...data });
                    }
                });

                listaDocs.sort((a, b) => new Date(b.fecha_registro) - new Date(a.fecha_registro));

                listaDocs.forEach((prestamo) => {
                    let estadoCalculado = 'al-dia';
                    let textoBadge = 'Al Día';
                    let claseBadge = 'status-al-dia';

                    if (prestamo.status === 'Finalizado') {
                        estadoCalculado = 'finalizado';
                        textoBadge = 'Liquidado';
                        claseBadge = 'status-finalizado';
                    } else if (prestamo.cuotas_detalle) {
                        const tieneMora = prestamo.cuotas_detalle.some(c => c.status === 'Pendiente' && (parsearFechaString(c.fecha_vencimiento).getTime() + ((Number(prestamo.dias_gracia)||0)*86400000)) < hoy.getTime());
                        if (tieneMora) {
                            estadoCalculado = 'atrasado';
                            textoBadge = 'Atrasado';
                            claseBadge = 'status-atrasado';
                        }
                    }

                    const tarjeta = document.createElement('div');
                    tarjeta.className = "loan-card";
                    tarjeta.setAttribute('data-status', estadoCalculado);
                    tarjeta.innerHTML = `
                        <div class="loan-header">
                            <div>
                                <h3>${prestamo.nombre_cliente}</h3>
                                <div class="loan-date">📅 Del: ${prestamo.fecha_inicio} al ${prestamo.fecha_termino}</div>
                            </div>
                            <div style="display:flex; flex-direction:column; align-items:flex-end; gap:5px;">
                                <span class="status-badge ${claseBadge}">${textoBadge}</span>
                                <button class="btn-del" onclick="eliminarPrestamo('${prestamo.id}')">Eliminar</button>
                            </div>
                        </div>
                        <div class="loan-details">
                            <div class="detail-item"><span>Monto</span><strong>$${Number(prestamo.monto_original).toLocaleString()}</strong></div>
                            <div class="detail-item"><span>Balance</span><strong class="mamei-text">$${Number(prestamo.balance_pendiente).toLocaleString()}</strong></div>
                        </div>
                    `;
                    contenedor.appendChild(tarjeta);
                });
                ejecutarFiltroPantalla(filtroActual);
            } catch (error) {
                console.error(error);
                contenedor.innerHTML = '<p style="text-align: center; color: red;">Error al cargar.</p>';
            }
        }

        function configurarFiltrosUI() {
            const mapeoBotones = { 'btn-filtro-todos': 'todos', 'btn-filtro-aldia': 'al-dia', 'btn-filtro-atrasado': 'atrasado', 'btn-filtro-finalizado': 'finalizado' };
            Object.keys(mapeoBotones).forEach(idBoton => {
                const btn = document.getElementById(idBoton);
                if (btn) btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    ejecutarFiltroPantalla(mapeoBotones[idBoton]);
                });
            });
        }

        function ejecutarFiltroPantalla(estado) {
            filtroActual = estado;
            document.querySelectorAll('.loan-card').forEach(card => {
                const status = card.getAttribute('data-status');
                card.style.display = (estado === 'todos' ? (status === 'al-dia' || status === 'atrasado') : status === estado) ? "flex" : "none";
            });
        }
    </script>
</body>
</html>
