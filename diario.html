<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobros - PRESA-FACIL</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; margin: 0; }
        .tarjeta { background: white; padding: 15px; border-radius: 15px; border: 2px solid #0f172a; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .nombre { font-size: 1.2rem; font-weight: 900; }
        .btn-volver { display: block; text-align: center; margin-top: 20px; padding: 15px; background: #ef4444; color: white; border-radius: 15px; text-decoration: none; font-weight: bold; }
        .datos-info { font-size: 0.9rem; color: #334155; margin-top: 5px; }
    </style>
</head>
<body>

    <h2 id="titulo">Cargando...</h2>
    <div id="lista-cobros">Cargando clientes...</div>
    <a href="cobros.html" class="btn-volver">VOLVER</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

       apiKey: "AIzaSyDlVPO8P6oceu2RyVZA_bjak7bvAEXxvQk",
  authDomain: "prestacom-sistema.firebaseapp.com",
  projectId: "prestacom-sistema",
  storageBucket: "prestacom-sistema.firebasestorage.app",
  messagingSenderId: "263392324772",
  appId: "1:263392324772:web:2d83308890ddaef7e84a31"
        
        
        };
        
        const db = getFirestore(initializeApp(firebaseConfig));
        const listaDiv = document.getElementById('lista-cobros');
        
        // --- CONFIGURACIÓN DE MODALIDAD ---
        const MODALIDAD = 1; 
        document.getElementById('titulo').innerText = "PRÉSTAMOS MODALIDAD " + MODALIDAD;

        const q = query(
            collection(db, "prestamos"), 
            where("id_empresa", "==", localStorage.getItem('id_empresa')),
            where("modalidad_dias", "==", MODALIDAD),
            where("status", "==", "Activo")
        );

        onSnapshot(q, (snapshot) => {
            listaDiv.innerHTML = "";
            
            if (snapshot.empty) { 
                listaDiv.innerHTML = "<p style='text-align:center; color: #64748b;'>No hay préstamos activos para esta modalidad.</p>"; 
                return; 
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const nombre = data.nombre_cliente || "Sin nombre";
                const monto = data.monto_prestado || 0;
                const valorCuota = data.valor_cuota || 0;
                
                const card = document.createElement('div');
                card.className = "tarjeta";
                card.innerHTML = `
                    <div>
                        <div class="nombre">${nombre}</div>
                        <div class="datos-info">
                            Monto: $${monto} | Cuota: $${valorCuota}<br>
                            Restan: ${data.cuotas_restantes || 0} de ${data.total_cuotas || 0}
                        </div>
                    </div>
                    <div style="font-weight:bold; color: #0f172a;">$${valorCuota}</div>
                `;
                
                card.onclick = () => {
                    localStorage.setItem('prestamo_id', doc.id);
                    localStorage.setItem('cliente_data', JSON.stringify(data));
                    window.location.href = "procesar_pago.html";
                };
                listaDiv.appendChild(card);
            });
        }, (error) => {
            console.error("Error al cargar:", error);
            listaDiv.innerHTML = "<p style='text-align:center; color: red;'>Error al cargar. Verifica conexión.</p>";
        });
    </script>
</body>
</html>
