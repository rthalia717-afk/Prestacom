<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Cobros</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; }
        .tarjeta { background: white; padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 10px; cursor: pointer; }
        .tarjeta:hover { border-color: #f97316; }
    </style>
</head>
<body>
    <h2 id="titulo">Cargando...</h2>
    <div id="lista-cobros"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Configuración Firebase (la misma que usas)
        const db = getFirestore(initializeApp({ /* tus credenciales */ }));
        
        const params = new URLSearchParams(window.location.search);
        const modal = params.get('modalidad'); // Obtiene 1, 7, 15 o 30
        
        const nombresModalidad = { "1": "Diarios", "7": "Semanales", "15": "Quincenales", "30": "Mensuales" };
        document.getElementById('titulo').innerText = "Préstamos " + nombresModalidad[modal];

        const q = query(collection(db, "prestamos"), where("modalidad_dias", "==", parseInt(modal)), where("status", "==", "Activo"));

        onSnapshot(q, (snapshot) => {
            const lista = document.getElementById('lista-cobros');
            lista.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                div.className = "tarjeta";
                div.innerHTML = `
                    <b>${d.nombre_cliente}</b><br>
                    Cuota: $${d.valor_cuota} | Pendientes: ${d.cuotas_restantes}
                `;
                div.onclick = () => {
                    localStorage.setItem('prestamo_id', doc.id);
                    window.location.href = "procesar_pago.html";
                };
                lista.appendChild(div);
            });
        });
    </script>
</body>
</html>
