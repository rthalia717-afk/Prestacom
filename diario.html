<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobros Diarios</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; }
        .tarjeta { background: white; padding: 15px; border-radius: 10px; border: 2px solid #0f172a; margin-bottom: 10px; }
        h2 { color: #1e293b; text-align: center; }
    </style>
</head>
<body>

    <h2>PRÉSTAMOS DIARIOS (Modalidad 1)</h2>
    <div id="lista-cobros">Cargando préstamos...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5oHQtFWzLqY3JdpV_3pKY40rx00o6Gu4",
            authDomain: "prestacom-36ebd.firebaseapp.com",
            projectId: "prestacom-36ebd",
            storageBucket: "prestacom-36ebd.firebasestorage.app",
            messagingSenderId: "787618813060",
            appId: "1:787618813060:web:8bbdc1bea7960cdbad5ed1"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const listaDiv = document.getElementById('lista-cobros');

        // LA CONSULTA FILTRADA
        const q = query(
            collection(db, "prestamos"), 
            where("id_empresa", "==", "EMP-101"),
            where("modalidad_dias", "==", 1),  // FILTRO POR MODALIDAD 1
            where("status", "==", "Activo")
        );

        onSnapshot(q, (snapshot) => {
            listaDiv.innerHTML = "";
            if (snapshot.empty) {
                listaDiv.innerHTML = "<p>No hay préstamos diarios activos.</p>";
                return;
            }
            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = "tarjeta";
                card.innerHTML = `
                    <h3>${data.nombre_cliente}</h3>
                    <p>Balance: $${data.balance_pendiente}</p>
                `;
                listaDiv.appendChild(card);
            });
        });
    </script>
</body>
</html>
