<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESA FACIL - Registrar Cobro</title>
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1e293b; --accent: #ff6600; --bg: #f1f5f9; --surface: #ffffff; --text: #0f172a; --border: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 30px; }
        .header { background-color: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .tarjeta-cliente-item { background: var(--surface); border: 2px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; cursor: pointer; }
        .no-data { text-align: center; color: #94a3b8; padding: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">CLIENTES ACTIVOS</div>

    <div class="container">
        <div class="lista-clientes" id="tabla-clientes-inyectar">
            <p class="no-data">Cargando...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5oHQtFWzLqY3JdpV_3pKY40rx00o6Gu4",
            authDomain: "prestacom-36ebd.firebaseapp.com",
            projectId: "prestacom-36ebd",
            storageBucket: "prestacom-36ebd.firebasestorage.app",
            messagingSenderId: "787618813060",
            appId: "1:787618813060:web:8bbdc1bea7960cdbad5ed1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const idEmpresaLogueada = localStorage.getItem('id_empresa');
        console.log("Buscando para empresa:", idEmpresaLogueada);

        // CONSULTA: He quitado el filtro 'status' para ver si aparecen los clientes
        const q = query(
            collection(db, "prestamos"), 
            where("id_empresa", "==", idEmpresaLogueada)
        );

        onSnapshot(q, (snapshot) => {
            const contenedor = document.getElementById('tabla-clientes-inyectar');
            contenedor.innerHTML = "";
            
            if (snapshot.empty) {
                contenedor.innerHTML = '<p class="no-data">No se encontraron préstamos para la empresa: ' + idEmpresaLogueada + '</p>';
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                // Dibujamos el cliente aunque no tenga status "Activo"
                const item = document.createElement('div');
                item.className = "tarjeta-cliente-item";
                item.innerHTML = `
                    <div>
                        <h4>${data.nombre_cliente || "Sin nombre"}</h4>
                        <p>Status en BD: <b>${data.status || "N/A"}</b></p>
                    </div>
                `;
                contenedor.appendChild(item);
            });
        });
    </script>
</body>
</html>
