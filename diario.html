<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobros Diarios - PRESA-FACIL</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; margin: 0; }
        .tarjeta { background: white; padding: 15px; border-radius: 15px; border: 2px solid #0f172a; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: transform 0.1s; }
        .tarjeta:active { transform: scale(0.98); }
        .nombre { font-size: 1.2rem; font-weight: 900; color: #1e293b; }
        .datos-info { font-size: 0.9rem; color: #475569; margin-top: 5px; }
        .btn-volver { display: block; text-align: center; margin-top: 20px; padding: 15px; background: #ef4444; color: white; border-radius: 15px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h2 id="titulo">Cargando Préstamos Diarios...</h2>
    <div id="lista-cobros">Cargando datos...</div>
    <a href="cobros.html" class="btn-volver">VOLVER</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
            authDomain: "prestacom-sistema-a2830.firebaseapp.com",
            projectId: "prestacom-sistema-a2830",
            storageBucket: "prestacom-sistema-a2830.firebasestorage.app",
            messagingSenderId: "500739174929",
            appId: "1:500739174929:web:1694f07bf65714606f77b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const listaDiv = document.getElementById('lista-cobros');
        const idEmpresa = localStorage.getItem('id_empresa');

        document.getElementById('titulo').innerText = "PRÉSTAMOS MODALIDAD DIARIA";

        // Filtro para modalidad 1 (Diaria) y estatus Activo
        const q = query(
            collection(db, "prestamos"), 
            where("id_empresa", "==", idEmpresa),
            where("modalidad_dias", "==", 1),
            where("status", "==", "Activo")
        );

        onSnapshot(q, (snapshot) => {
            listaDiv.innerHTML = "";
            
            if (snapshot.empty) {
                listaDiv.innerHTML = "<p style='text-align:center;'>No hay préstamos diarios activos.</p>";
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = "tarjeta";
                card.innerHTML = `
                    <div>
                        <div class="nombre">${data.nombre_cliente || "Sin nombre"}</div>
                        <div class="datos-info">
                            Cuota: $${data.valor_cuota || 0} | Restan: ${data.cuotas_restantes || 0}
                        </div>
                    </div>
                    <div style="font-weight:bold; color: #0f172a;">PAGAR</div>
                `;
                
                card.onclick = () => {
                    localStorage.setItem('prestamo_id', doc.id);
                    localStorage.setItem('cliente_data', JSON.stringify(data));
                    window.location.href = "procesar_pago.html";
                };
                listaDiv.appendChild(card);
            });
        }, (error) => {
            console.error("Error al cargar:", error);
            // Si sale error de índice, el link aparecerá aquí en la consola (F12)
            listaDiv.innerHTML = "<p style='color:red;'>Error al cargar. Revisa la consola (F12).</p>";
        });
    </script>
</body>
</html>
