<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRESTACOM 2.0 - Cobros Diarios</title>

<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
    body { background:#f1f5f9; display:flex; justify-content:center; }
    .container { width:100%; max-width:480px; min-height:100vh; background:#fff; }
    header { background:#1e293b; color:#fff; padding:15px; display:flex; align-items:center; gap:10px; position:sticky; top:0; }
    header a { color:#fff; text-decoration:none; font-size:20px; }
    h1 { font-size:18px; }
    .list { padding:15px; display:flex; flex-direction:column; gap:10px; }
    .card { background:#f8fafc; border:1px solid #e5e7eb; border-radius:10px; padding:12px; }
    .top { display:flex; justify-content:space-between; margin-bottom:6px; }
    .name { font-weight:bold; font-size:14px; }
    .status { font-size:12px; padding:3px 8px; border-radius:20px; background:#facc15; }
    .status.paid { background:#22c55e; color:#fff; }
    .info { font-size:13px; margin-bottom:10px; line-height: 1.5; }
    
    button {
        width:100%; padding:10px; border:none; border-radius:8px; 
        background:#ff6600; color:#fff; font-weight:bold; cursor:pointer;
    }
    /* Clase para cuando está pagado */
    .btn-paid { background:#22c55e !important; }
</style>
</head>

<body>

<div class="container">
    <header>
        <a href="index.html">⬅</a>
        <h1>Cobros Diarios</h1>
    </header>
    <div class="list" id="lista"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, query, where, onSnapshot, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
    authDomain: "prestacom-sistema-a2830.firebaseapp.com",
    projectId: "prestacom-sistema-a2830",
    storageBucket: "prestacom-sistema-a2830.appspot.com",
    messagingSenderId: "500739174929",
    appId: "1:500739174929:web:1694f07bf65714606f77b0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const idEmpresa = localStorage.getItem("id_empresa");
if (!idEmpresa) window.location.href = "login.html";

const lista = document.getElementById("lista");

const q = query(
    collection(db, "prestamos"),
    where("id_empresa", "==", idEmpresa),
    where("modalidad", "==", "diario"),
    where("estado", "==", "activo")
);

onSnapshot(q, (snapshot) => {
    lista.innerHTML = "";
    snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const div = document.createElement("div");
        div.className = "card";

        const pagado = data.pagado_hoy ? "paid" : "";

        div.innerHTML = `
            <div class="top">
                <div class="name">${data.nombre_cliente || "Sin nombre"}</div>
                <div class="status ${pagado}">${data.pagado_hoy ? "Pagado" : "Pendiente"}</div>
            </div>
            <div class="info">
                Monto Original: RD$ ${data.monto_original || 0} <br>
                Cuota: RD$ ${data.cuota || 0} <br>
                Cuotas: ${data.cuotas_detalle || "N/A"} <br>
                Balance Pendiente: RD$ ${data.balance_pendiente || 0}
            </div>
            <button class="${data.pagado_hoy ? 'btn-paid' : ''}">
                ${data.pagado_hoy ? "Ya Pagado Hoy" : "Marcar Pago"}
            </button>
        `;

        const btn = div.querySelector("button");

        btn.addEventListener("click", async () => {
            if (data.pagado_hoy) {
                alert("¡Este préstamo ya tiene el pago registrado hoy!");
            } else {
                // 1. Guardar pago con toda la info detallada
                const docRef = await addDoc(collection(db, "pagos"), {
                    id_prestamo: docSnap.id,
                    id_empresa: idEmpresa,
                    nombre_cliente: data.cliente_nombre,
                    monto_original: data.monto_original,
                    fecha_inicio: data.fecha_inicio,
                    cuotas_detalle: data.cuotas_detalle,
                    balance_pendiente: data.balance_pendiente,
                    monto_abonado: data.cuota,
                    fecha: new Date().toISOString(),
                    tipo: "diario"
                });

                // 2. Marcar préstamo como pagado hoy
                await updateDoc(doc(db, "prestamos", docSnap.id), {
                    pagado_hoy: true
                });

                // 3. Abrir recibo
                window.open("recibo_pago.html?id=" + docRef.id, "_blank");
            }
        });

        lista.appendChild(div);
    });
});
</script>
</body>
</html>
