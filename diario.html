<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESA-FACIL - Cobros Diario</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        body { background:#f1f5f9; display:flex; justify-content:center; }
        .container { width:100%; max-width:480px; min-height:100vh; background:#fff; }
        header { background:#1e293b; color:#fff; padding:15px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:100; }
        header a { color:#fff; text-decoration:none; font-size:20px; }
        .search-box { padding: 15px; background: #f1f5f9; }
        #buscar { width:100%; padding:12px; border-radius:8px; border:1px solid #cbd5e1; font-size:16px; }
        .list { padding:15px; display:flex; flex-direction:column; gap:10px; }
        .card { background:#f8fafc; border:1px solid #e5e7eb; border-radius:10px; padding:15px; }
        .top { display:flex; justify-content:space-between; margin-bottom:8px; }
        .name { font-weight:bold; font-size:15px; color:#1e293b; }
        .status { font-size:12px; padding:4px 10px; border-radius:20px; background:#facc15; font-weight:bold; }
        .status.paid { background:#22c55e; color:#fff; }
        .info { font-size:14px; color:#475569; margin-bottom:12px; line-height: 1.6; }
        .input-pago { width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px; font-size:16px; margin-bottom:10px; text-align:center; }
        button { width:100%; padding:12px; border:none; border-radius:8px; background:#1e293b; color:#fff; font-weight:bold; cursor:pointer; }
        .btn-extra { background:#ff6600; }
    </style>
</head>

<body>
<div class="container">
    <header>
        <a href="index.html">⬅</a>
        <h1>Cobros Diario</h1>
    </header>
    <div class="search-box">
        <input type="text" id="buscar" placeholder="Buscar cliente por nombre...">
    </div>
    <div class="list" id="lista"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
        authDomain: "prestacom-sistema-a2830.firebaseapp.com",
        projectId: "prestacom-sistema-a2830",
        storageBucket: "prestacom-sistema-a2830.appspot.com",
        messagingSenderId: "500739174929",
        appId: "1:500739174929:web:1694f07bf65714606f77b0"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const idEmpresa = localStorage.getItem("id_empresa");

    let todosLosPrestamos = []; // Aquí guardaremos la base maestra

    const q = query(collection(db, "prestamos"), where("id_empresa", "==", idEmpresa), where("modalidad", "==", "diario"), where("estado", "==", "activo"));

    onSnapshot(q, (snapshot) => {
        todosLosPrestamos = []; // Limpiamos la memoria
        snapshot.forEach((doc) => { 
            todosLosPrestamos.push({ id: doc.id, ...doc.data() }); 
        });
        // Renderizamos todo por defecto al cargar o al actualizarse Firebase
        renderizar(todosLosPrestamos);
    });

    function renderizar(lista) {
        const contenedor = document.getElementById("lista");
        contenedor.innerHTML = "";
        lista.forEach(data => {
            if ((parseFloat(data.total) || 0) <= 0) return;
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `
                <div class="top">
                    <div class="name">${data.cliente_nombre || "Sin nombre"}</div>
                    <div class="status ${data.pagado_hoy ? 'paid' : ''}">${data.pagado_hoy ? "Pagado Hoy" : "Pendiente"}</div>
                </div>
                <div class="info">
                    Balance Pendiente: RD$ ${data.total || 0} <br>
                    Cuotas: ${data.cuotas_pagadas || 0} de ${data.cuotas || 0}
                </div>
                <input type="number" value="${data.cuota || 0}" class="input-pago">
                <button class="${data.pagado_hoy ? 'btn-extra' : ''}">
                    ${data.pagado_hoy ? "Registrar Otro Pago" : "Marcar Pago"}
                </button>
            `;

            div.querySelector("button").addEventListener("click", async () => {
                const montoPagado = Number(div.querySelector(".input-pago").value);
                const nuevoBalance = Number(data.total) - montoPagado;
                const nuevasCuotasPagadas = (data.cuotas_pagadas || 0) + 1;

                const docRef = await addDoc(collection(db, "pagos"), {
                    id_prestamo: data.id,
                    id_empresa: idEmpresa,
                    cliente_nombre: data.cliente_nombre,
                    monto_pagado: montoPagado,
                    balance_nuevo: nuevoBalance,
                    fecha: new Date().toISOString(),
                    tipo: "diario"
                });

                await updateDoc(doc(db, "prestamos", data.id), {
                    pagado_hoy: true,
                    total: nuevoBalance,
                    cuotas_pagadas: nuevasCuotasPagadas
                });

                window.open("recibo_pago.html?id=" + docRef.id, "_blank");
            });
            contenedor.appendChild(div);
        });
    }

    // El buscador ahora es un "filtro" sobre la lista maestra
    document.getElementById("buscar").addEventListener("input", (e) => {
        const busqueda = e.target.value.toUpperCase();
        if (busqueda === "") {
            renderizar(todosLosPrestamos); // Si borra, muestra todo de nuevo
        } else {
            const filtrados = todosLosPrestamos.filter(p => 
                (p.cliente_nombre || "").toUpperCase().includes(busqueda)
            );
            renderizar(filtrados);
        }
    });
</script>
</body>
</html>
