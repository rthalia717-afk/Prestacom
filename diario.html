<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PRESTACOM 2.0 - Cobros Diarios</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        body { background:#f1f5f9; display:flex; justify-content:center; }
        .container { width:100%; max-width:480px; min-height:100vh; background:#fff; }
        header { background:#1e293b; color:#fff; padding:15px; display:flex; align-items:center; gap:10px; }
        .list { padding:15px; display:flex; flex-direction:column; gap:10px; }
        .card { background:#f8fafc; border:1px solid #e5e7eb; border-radius:10px; padding:15px; }
        .name { font-weight:bold; font-size:16px; margin-bottom:5px; }
        .info { font-size:14px; color:#475569; margin-bottom:10px; }
        .input-pago { width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px; margin-bottom:10px; text-align:center; }
        button { width:100%; padding:12px; border:none; border-radius:8px; background:#1e293b; color:#fff; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>
<div class="container">
    <header><h1>Cobros Diarios</h1></header>
    <div class="list" id="lista"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // ... (Tu firebaseConfig aquí) ...

    const db = getFirestore(initializeApp(firebaseConfig));
    const idEmpresa = localStorage.getItem("id_empresa");

    const q = query(
        collection(db, "prestamos"),
        where("id_empresa", "==", idEmpresa),
        where("estado", "==", "activo") // Solo activos
    );

    onSnapshot(q, (snapshot) => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            if (data.total <= 0) return; // Filtro de seguridad: no mostrar saldados

            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `
                <div class="name">${data.cliente_nombre}</div>
                <div class="info">
                    Cuota: ${data.cuotas_pagadas || 0} / ${data.cantidad_cuotas || "N/A"} <br>
                    Balance Pendiente: RD$ ${parseFloat(data.total).toFixed(2)}
                </div>
                <input type="number" value="${data.cuota}" class="input-pago">
                <button>Marcar Pago</button>
            `;

            div.querySelector("button").addEventListener("click", async () => {
                const monto = parseFloat(div.querySelector(".input-pago").value);
                const nuevoTotal = Math.round((data.total - monto) * 100) / 100;
                const esFinal = nuevoTotal <= 0;

                await addDoc(collection(db, "pagos"), {
                    id_prestamo: docSnap.id,
                    monto_pagado: monto,
                    fecha: new Date().toISOString()
                });

                await updateDoc(doc(db, "prestamos", docSnap.id), {
                    total: nuevoTotal,
                    cuotas_pagadas: (data.cuotas_pagadas || 0) + 1,
                    estado: esFinal ? "finalizado" : "activo"
                });
            });
            lista.appendChild(div);
        });
    });
</script>
</body>
</html>
