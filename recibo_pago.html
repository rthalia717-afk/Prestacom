<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibo de Pago - PRESTACOM</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; width: 80mm; margin: 0; padding: 10px; font-size: 13px; color: #000; }
        .header { text-align: center; border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; }
        .header h2 { font-size: 18px; margin: 0; text-transform: uppercase; }
        .section-title { font-weight: bold; border-bottom: 1px solid #000; margin: 10px 0 5px 0; padding-bottom: 2px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .total-box { border-top: 2px solid #000; border-bottom: 2px solid #000; margin-top: 10px; padding: 5px 0; font-weight: bold; font-size: 16px; }
        @media print { @page { size: 80mm auto; margin: 0; } body { padding: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <h2>PRESTACOM</h2>
        <p>Comprobante de Pago</p>
    </div>

    <div id="contenido">
        <div class="section-title">DETALLES</div>
        <div class="row"><span>Fecha:</span> <span id="lbl-fecha">Cargando...</span></div>
        <div class="row"><span>Cliente:</span> <span id="lbl-cliente">...</span></div>
        
        <div class="section-title">ESTADO</div>
        <div class="row"><span>Cuota #:</span> <span id="lbl-cuota">...</span></div>
        <div class="row"><span>Balance:</span> <span id="lbl-balance">...</span></div>
        
        <div class="total-box row">
            <span>PAGADO:</span>
            <span>RD$ <span id="lbl-monto">0.00</span></span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
            projectId: "prestacom-sistema-a2830",
            appId: "1:500739174929:web:1694f07bf65714606f77b0"
        };
        
        const db = getFirestore(initializeApp(firebaseConfig));

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");

            try {
                // Si hay ID, buscamos en Firebase
                if (id) {
                    const snap = await getDoc(doc(db, "pagos", id));
                    if (snap.exists()) {
                        renderizar(snap.data());
                    } else {
                        throw new Error("Recibo no encontrado");
                    }
                } else {
                    // Si no hay ID, probamos con localStorage (Plan B)
                    const localData = JSON.parse(localStorage.getItem('ultimo_ticket'));
                    if (localData) renderizar(localData);
                    else document.getElementById("contenido").innerText = "No hay datos para mostrar.";
                }
            } catch (e) {
                document.getElementById("contenido").innerText = "Error: " + e.message;
            }
        }

        function renderizar(data) {
            document.getElementById('lbl-fecha').innerText = new Date(data.fecha).toLocaleDateString();
            document.getElementById('lbl-cliente').innerText = data.cliente_nombre || data.cliente;
            document.getElementById('lbl-cuota').innerText = data.cuotas_pagadas || data.cuota_num;
            document.getElementById('lbl-balance').innerText = "RD$ " + (data.balance_nuevo || "0.00");
            document.getElementById('lbl-monto').innerText = parseFloat(data.monto_pagado).toFixed(2);

            // Impresión automática con un pequeño margen para asegurar renderizado
            setTimeout(() => {
                window.print();
                setTimeout(() => window.history.back(), 1000);
            }, 800);
        }

        init();
    </script>
</body>
</html>
