<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibo de Pago - Prestacóm</title>
   <style>
    /* 1. Fuente y fondo */
    body { font-family: 'Courier New', Courier, monospace; background: #f1f5f9; display: flex; justify-content: center; margin: 0; padding: 20px; }
    
    /* 2. Ajuste para el ticket */
    .ticket { width: 100%; max-width: 300px; background: white; padding: 15px; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    
    .center { text-align: center; }
    h2 { font-size: 20px; margin: 5px 0; text-transform: uppercase; }
    
    /* 3. Ajuste de legibilidad */
    .info { font-size: 13px; margin: 4px 0; display: flex; justify-content: space-between; }
    .info b { margin-right: 5px; }
    
    .line { border-top: 1px dashed #333; margin: 10px 0; }
    
    /* 4. Estilo de botones */
    .print-btn { width: 100%; padding: 12px; margin-top: 10px; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }
    .btn-web { background: #ff6600; }
    .btn-bt { background: #28a745; }
    
    /* Asegurar que al imprimir se vea bien */
    @media print { 
        body { background: white; padding: 0; }
        .ticket { border: none; box-shadow: none; width: 100%; }
        .print-btn { display: none; } 
    }
</style>
</head>
<body>

<div class="ticket">
    <div class="center">
        <h2>PRESA-FACIL</h2>
        <p class="info">Comprobante de Pago</p>
    </div>
    <div class="line"></div>
    <div id="contenido">Cargando datos...</div>
    <div class="line"></div>
    
    <button class="print-btn btn-web" onclick="window.print()">🖨 Imprimir (Sistema)</button>
    <button id="btnBluetooth" class="print-btn btn-bt">🖨 Imprimir (Bluetooth)</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
        authDomain: "prestacom-sistema-a2830.firebaseapp.com",
        projectId: "prestacom-sistema-a2830",
        storageBucket: "prestacom-sistema-a2830.appspot.com",
        messagingSenderId: "500739174929",
        appId: "1:500739174929:web:1694f07bf65714606f77b0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let datosTicket = null;

    const urlParams = new URLSearchParams(window.location.search);
    const id_pago = urlParams.get("id");

    async function cargarRecibo() {
        if (!id_pago) {
            document.getElementById("contenido").innerHTML = "Error: No se encontró el ID del pago.";
            return;
        }
        
        const snap = await getDoc(doc(db, "pagos", id_pago));
        if (!snap.exists()) {
            document.getElementById("contenido").innerHTML = "Error: El pago no existe.";
            return;
        }
        
        datosTicket = snap.data();
        
        // Formateo de datos
        const pagadas = parseInt(datosTicket.cuotas_pagadas || 0);
        const total = parseInt(datosTicket.cuotas_totales || 0);
        const monto = parseFloat(datosTicket.monto_pagado || 0).toFixed(2);
        const balance = parseFloat(datosTicket.balance_nuevo || 0).toFixed(2);
        const prestado = parseFloat(datosTicket.monto_prestamo || 0).toFixed(2);
        const restantes = total - pagadas;

        document.getElementById("contenido").innerHTML = `
            
          
            <div class="info"><b>Cliente:</b> ${datosTicket.cliente_nombre || 'N/A'}</div>
            <div class="info"><b>Fecha:</b> ${new Date(datosTicket.fecha).toLocaleString()}</div>
            <div class="line"></div>
            
            <div class="info"><b>Monto Pagado:</b> RD$ ${monto}</div>
             <div class="info"><b>Monto Prestado:</b> RD$ ${prestado}</div>
            <div class="line"></div>
            <div class="info"><b>Cuotas Pagadas:</b> ${pagadas} </div>
            <div class="info"><b>Cuotas Totales:</b> ${total}</div>
            <div class="info"><b>Balance Pendiente:</b> RD$ ${balance}</div>
         

           
        `;
    }

    async function imprimirBluetooth() {
        if (!datosTicket) return;
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            const characteristic = await service.getCharacteristic('00002ae1-0000-1000-8000-00805f9b34fb');

            const encoder = new TextEncoder();
            const text = `PRESA-FACIL\nRecibo de Pago\n----------------\nCliente: ${datosTicket.cliente_nombre}\nMonto: RD$ ${datosTicket.monto_pagado}\nBalance: ${datosTicket.balance_nuevo}\n\n\n`;
            await characteristic.writeValue(encoder.encode(text));
            alert("¡Ticket enviado a la impresora!");
        } catch (error) {
            alert("Error: Asegúrate de tener Bluetooth encendido y la impresora vinculada.");
            console.error(error);
        }
    }

    document.getElementById("btnBluetooth").addEventListener("click", imprimirBluetooth);
    cargarRecibo();
</script>
</body>
</html>
