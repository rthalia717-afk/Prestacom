<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recibo</title>
    <style>
        body { font-family: Arial, sans-serif; font-size: 14px; width: 58mm; padding: 0; margin: 0; }
        .ticket { width: 100%; }
        .center { text-align: center; }
        .line { border-bottom: 1px dashed #000; margin: 5px 0; }
        @media print {
            body { width: 58mm; }
        }
    </style>
</head>
<body>

<div class="ticket" id="contenido">
    Cargando...
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // ... (Tu objeto firebaseConfig aquí) ...

    const db = getFirestore(initializeApp(firebaseConfig));
    const id_pago = new URLSearchParams(window.location.search).get("id");

    async function cargar() {
        const snap = await getDoc(doc(db, "pagos", id_pago));
        const data = snap.data();
        
        document.getElementById("contenido").innerHTML = `
            <div class="center"><h2>PRESA-FACIL</h2></div>
            <div class="line"></div>
            <div><b>Cliente:</b> ${data.cliente_nombre}</div>
            <div><b>Monto:</b> RD$ ${data.monto_pagado}</div>
            <div><b>Balance:</b> RD$ ${data.balance_nuevo}</div>
            <div class="line"></div>
        `;

        // Imprimir automáticamente
        setTimeout(() => {
            window.print();
        }, 1000);
    }
    cargar();
</script>
</body>
</html>
