<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recibo de Pago</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; width: 56mm; margin: 0; padding: 5px; font-size: 14px; font-weight: bold; color: #000; }
        .header { text-align: center; border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; }
        .header h2 { font-size: 18px; margin: 0; text-transform: uppercase; }
        .section-title { font-weight: bold; border-bottom: 1px solid #000; margin: 10px 0 5px 0; padding-bottom: 2px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 3px; font-weight: bold; }
        .total-box { border-top: 2px solid #000; border-bottom: 2px solid #000; margin-top: 10px; padding: 5px 0; font-weight: bold; font-size: 17px; }
        @media print { @page { size: 58mm auto; margin: 0; } body { padding: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="empresa-nombre">PRESTACOM 2.0</h2>
    </div>

    <div class="section-title">DETALLES</div>
    <div class="row"><span>Fecha:</span> <span id="lbl-fecha">---</span></div>
    <div class="row"><span>Cliente:</span> <span id="lbl-cliente">---</span></div>
    
    <div class="section-title">ESTADO</div>
    <div class="row"><span>Cuota #:</span> <span id="lbl-cuota">---</span></div>
    <div class="row"><span>Faltantes:</span> <span id="lbl-restantes">---</span></div>
    
    <div class="total-box row">
        <span>PAGADO:</span>
        <span>RD$ <span id="lbl-monto">0.00</span></span>
    </div>

    <script>
        const ticket = JSON.parse(localStorage.getItem('ultimo_ticket'));
        
        if (ticket) {
            // Carga de datos
            document.getElementById('lbl-cliente').innerText = ticket.cliente || "---";
            document.getElementById('lbl-fecha').innerText = ticket.fecha || "---";
            document.getElementById('lbl-cuota').innerText = ticket.cuota_num || "---";
            document.getElementById('lbl-restantes').innerText = ticket.cuotas_restantes || "---";
            
            // Corrección de decimales
            const monto = parseFloat(ticket.monto_pagado || 0);
            document.getElementById('lbl-monto').innerText = monto.toFixed(2);

            // Impresión inmediata
            setTimeout(() => {
                window.print();
                setTimeout(() => { window.history.back(); }, 1000);
            }, 500);
        } else {
            alert("No hay datos de ticket.");
            window.history.back();
        }
    </script>
</body>
</html>
