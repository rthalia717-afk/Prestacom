<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de Pago - Prestacóm</title>

<style>
   <style>
    body { margin: 0; padding: 0; font-family: Arial; }
    .ticket { 
        width: 100%; /* Ocupa todo el ancho disponible */
        max-width: 320px; /* Tamaño máximo para que no se estire demasiado */
        padding: 5px;
    }
    .center { text-align: center; }
    h2 { font-size: 16px; margin: 5px 0; }
    .info { font-size: 14px; margin: 4px 0; }
    .line { border-top: 1px dashed #000; margin: 8px 0; }
    .print-btn { display: none; } /* Ocultar botón al imprimir */

    @media print {
        @page {
            size: 58mm auto; /* Fuerza el tamaño de la impresora */
            margin: 0;
        }
        body { background: white; }
        .ticket { border: none; margin: 0; 
    }
</style>
    @media print { .print-btn { display: none; } body { background: white; } }
</style>
</head>

<body>
<div class="ticket">
    <div class="center">
        <h2>PRESA-FACIL</h2>
        <p class="info">Comprobante de Pago</p>
    </div>
    <div class="line"></div>
    <div id="contenido">Cargando datos...</div>
    <div class="line"></div>
    
    <button class="print-btn btn-web" onclick="window.print()">🖨 Imprimir Recibo</button>
    <button id="btnBluetooth" class="print-btn btn-bt">🖨 Imprimir Bluetooth</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
        authDomain: "prestacom-sistema-a2830.firebaseapp.com",
        projectId: "prestacom-sistema-a2830",
        storageBucket: "prestacom-sistema-a2830.appspot.com",
        messagingSenderId: "500739174929",
        appId: "1:500739174929:web:1694f07bf65714606f77b0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Variable global para guardar los datos y usarlos en Bluetooth
    let dataGlobal = null;

    const urlParams = new URLSearchParams(window.location.search);
    const id_pago = urlParams.get("id");

    async function cargarRecibo() {
        if (!id_pago) {
            document.getElementById("contenido").innerHTML = "Error: ID no encontrado";
            return;
        }

        const snap = await getDoc(doc(db, "pagos", id_pago));
        if (!snap.exists()) {
            document.getElementById("contenido").innerHTML = "Error: Recibo no encontrado";
            return;
        }

        dataGlobal = snap.data(); // Guardamos los datos aquí

        const total = parseInt(dataGlobal.cuotas_totales) || 0;
        const pagadas = parseInt(dataGlobal.cuotas_pagadas) || 0;
        const faltantes = total - pagadas;

        document.getElementById("contenido").innerHTML = `
            <div class="info"><b>Cliente:</b> ${dataGlobal.cliente_nombre}</div>
            <div class="info"><b>Fecha:</b> ${new Date(dataGlobal.fecha).toLocaleString()}</div>
            <div class="line"></div>
            <div class="info"><b>Monto Pagado:</b> RD$ ${parseFloat(dataGlobal.monto_pagado).toFixed(2)}</div>
            <div class="info"><b>Cuotas:</b> ${pagadas} de ${total}</div>
            <div class="info"><b>Cuotas Faltantes:</b> ${faltantes >= 0 ? faltantes : 0}</div>
            <div class="info"><b>Modalidad:</b> ${dataGlobal.modalidad || "N/A"}</div>
            <div class="info"><b>Balance Restante:</b> RD$ ${parseFloat(dataGlobal.balance_nuevo).toFixed(2)}</div>
        `;
    }

    // Nueva función para Bluetooth
    async function imprimirBluetooth() {
        if (!dataGlobal) return alert("Esperando datos...");
        
        try {
            //const device = await navigator.bluetooth.requestDevice({
              // filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }]


// Cambia esto en la función imprimirBluetooth:
const device = await navigator.bluetooth.requestDevice({
    acceptAllDevices: true, // Esto mostrará TODAS las impresoras cercanas
    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb'] // UUID común de soporte
});


             
    
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            const characteristic = await service.getCharacteristic('00002ae1-0000-1000-8000-00805f9b34fb');

            const encoder = new TextEncoder();
            const ticketText = `
PRESA-FACIL
Comprobante de Pago
----------------
Cliente: ${dataGlobal.cliente_nombre}
Fecha: ${new Date(dataGlobal.fecha).toLocaleString()}
----------------
Monto Pagado: RD$ ${parseFloat(dataGlobal.monto_pagado).toFixed(2)}
Cuotas: ${dataGlobal.cuotas_pagadas} de ${dataGlobal.cuotas_totales}
Balance Restante: RD$ ${parseFloat(dataGlobal.balance_nuevo).toFixed(2)}
----------------
\n\n\n`;
            await characteristic.writeValue(encoder.encode(ticketText));
        } catch (err) {
            console.error(err);
            alert("No se pudo conectar a la impresora.");
        }
    }

    document.getElementById("btnBluetooth").addEventListener("click", imprimirBluetooth);
    cargarRecibo();
</script>
</body>
</html>
