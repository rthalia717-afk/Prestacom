<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibo de Pago - Prestacóm</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #eee; display: flex; justify-content: center; margin: 0; padding: 5px; font-weight: bold; }
        .ticket { width: 100%; max-width: 280px; background: white; padding: 10px; border: 1px solid #000; font-size: 12px; }
        .center { text-align: center; }
        h2 { font-size: 16px; margin: 0 0 5px 0; text-transform: uppercase; }
        .info { margin: 4px 0; display: flex; justify-content: space-between; }
        .line { border-top: 1px dashed #000; margin: 8px 0; }
        .print-btn { width: 100%; padding: 10px; margin-top: 5px; border: none; color: white; font-weight: bold; cursor: pointer; }
        .btn-web { background: #ff6600; }
        .btn-bt { background: #28a745; }
        @media print { .print-btn { display: none; } }
    </style>
</head>
<body>

<div class="ticket">
    <div class="center">
        <h2>PRESA-FACIL</h2>
        <p style="margin:0">Comprobante de Pago</p>
    </div>
    <div class="line"></div>
    <div id="contenido">Cargando datos...</div>
    <div class="line"></div>
    
    <button class="print-btn btn-web" onclick="window.print()">🖨 Imprimir (Sistema)</button>
    <button id="btnBluetooth" class="print-btn btn-bt">🖨 Imprimir (Bluetooth)</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
        authDomain: "prestacom-sistema-a2830.firebaseapp.com",
        projectId: "prestacom-sistema-a2830",
        storageBucket: "prestacom-sistema-a2830.appspot.com",
        messagingSenderId: "500739174929",
        appId: "1:500739174929:web:1694f07bf65714606f77b0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let datosTicket = null;

    const urlParams = new URLSearchParams(window.location.search);
    const id_pago = urlParams.get("id");

    async function cargarRecibo() {
        if (!id_pago) return;
        const snap = await getDoc(doc(db, "pagos", id_pago));
        if (!snap.exists()) return;
        
        datosTicket = snap.data();
        
        const pagadas = parseInt(datosTicket.cuotas_pagadas || 0);
        const total = parseInt(datosTicket.cuotas_totales || 0);
        const monto = parseFloat(datosTicket.monto_pagado || 0).toFixed(2);
        const balance = parseFloat(datosTicket.balance_nuevo || 0).toFixed(2);
        const prestado = parseFloat(datosTicket.monto_prestamo || 0).toFixed(2);

        document.getElementById("contenido").innerHTML = `
            <div class="info"><span>Cliente:</span> <span>${datosTicket.cliente_nombre}</span></div>
            <div class="info"><span>Prestamo:</span> <span>RD$ ${prestado}</span></div>
            <div class="info"><span>Abono:</span> <span>RD$ ${monto}</span></div>
            <div class="info"><span>Cuotas:</span> <span>${pagadas} de ${total}</span></div>
            <div class="info"><span>Restantes:</span> <span>${total - pagadas}</span></div>
            <div class="info"><span>Balance:</span> <span>RD$ ${balance}</span></div>
        `;
    }

    async function imprimirBluetooth() {
        if (!datosTicket) return;
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            const characteristic = await service.getCharacteristic('00002ae1-0000-1000-8000-00805f9b34fb');

            const encoder = new TextEncoder();
            const text = `PRESA-FACIL\nCOMPROBANTE DE PAGO\n--------------------------------\nCLIENTE: ${datosTicket.cliente_nombre}\nPRESTAMO: RD$ ${datosTicket.monto_prestamo}\nABONO: RD$ ${datosTicket.monto_pagado}\nCUOTAS: ${datosTicket.cuotas_pagadas}/${datosTicket.cuotas_totales}\nBALANCE: RD$ ${datosTicket.balance_nuevo}\n--------------------------------\nGRACIAS POR SU PAGO\n\n\n`;
            await characteristic.writeValue(encoder.encode(text));
            alert("¡Ticket enviado a la impresora!");
        } catch (error) {
            alert("Error: Asegúrate de tener Bluetooth encendido.");
            console.error(error);
        }
    }

    document.getElementById("btnBluetooth").addEventListener("click", imprimirBluetooth);
    cargarRecibo();
</script>
</body>
</html>
