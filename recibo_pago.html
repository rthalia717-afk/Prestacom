<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 58mm; font-family: 'Courier New', monospace; font-size: 12px; margin: 0; padding: 5px; }
        .center { text-align: center; }
        .line { border-bottom: 1px dashed #000; margin: 5px 0; }
        .data { display: flex; justify-content: space-between; }
        .monto { font-size: 16px; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="center">
        <h2>PRESA-FACIL</h2>
        <p>Tel: **********</p>
        <div class="line"></div>
    </div>
    
    <p id="fecha"></p>
    <p>Cliente: <span id="cliente"></span></p>
    <div class="line"></div>
    
    <div class="data"><p>Monto Prestado:</p><p>RD$ <span id="prestado"></span></p></div>
    <div class="data"><p>Cuota Pagada:</p><p>RD$ <span id="pagado"></span></p></div>
    <div class="data"><p>Cuotas Pgd:</p><p><span id="cuotas"></span></p></div>
    <div class="data"><p>Balance:</p><p>RD$ <span id="balance"></span></p></div>
    
    <div class="line"></div>
    <p class="center">¡Gracias por su pago!</p>
    <p class="center">--------------------</p>

    <script>
        // Obtener datos de la URL
        const params = new URLSearchParams(window.location.search);
        document.getElementById('fecha').innerText = "Fecha: " + new Date().toLocaleString();
        document.getElementById('cliente').innerText = params.get('cliente') || "N/A";
        document.getElementById('prestado').innerText = params.get('monto_prestado') || "0";
        document.getElementById('pagado').innerText = params.get('monto_pagado') || "0";
        document.getElementById('cuotas').innerText = params.get('cuotas_pagadas') || "0";
	document.getElementById('cuotas').innerText = params.get('cuotas_totales') || "0";
        document.getElementById('balance').innerText = params.get('balance_nuevo') || "0";

        // Imprimir automáticamente
        window.onload = () => {
            window.print();
            // Opcional: cerrar ventana tras imprimir
            // setTimeout(() => window.close(), 1000);
        };
    </script>
</body>
</html>
