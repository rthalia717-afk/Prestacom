<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibo de Pago - Prestacóm</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#eee;
            display:flex;
            justify-content:center;
            margin:0;
            padding:5px;
            font-size:14px;
            font-weight:bold;
        }

        .ticket{
            width:100%;
            max-width:280px;
            background:#fff;
            padding:10px;
            border:1px solid #000;
        }

        .center{
            text-align:center;
        }

        h2{
            margin:0;
            font-size:18px;
        }

        .info{
            display:flex;
            justify-content:space-between;
            margin:5px 0;
        }

        .line{
            border-top:1px dashed #000;
            margin:8px 0;
        }

        .print-btn{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:none;
            color:#fff;
            font-weight:bold;
            cursor:pointer;
        }

        .btn-web{background:#ff6600;}
        .btn-bt{background:#28a745;}

        @media print{
            .print-btn{
                display:none;
            }
        }
    </style>

</head>

<body>

<div class="ticket">

    <div class="center">
        <h2>PRESA-FACIL</h2>
        <div>Comprobante de Pago</div>
         <div>Telf:829-861-1433</div>
    </div>

    <div class="line"></div>

    <div id="contenido">
        Cargando datos...
    </div>

    <div class="line"></div>

    <button class="print-btn btn-web" onclick="window.print()">🖨 Imprimir (Sistema)</button>

    <button id="btnBluetooth" class="print-btn btn-bt">
        🖨 Imprimir (Bluetooth)
    </button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {

    apiKey:"AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
    authDomain:"prestacom-sistema-a2830.firebaseapp.com",
    projectId:"prestacom-sistema-a2830",
    storageBucket:"prestacom-sistema-a2830.appspot.com",
    messagingSenderId:"500739174929",
    appId:"1:500739174929:web:1694f07bf65714606f77b0"

};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let datosTicket=null;

const urlParams=new URLSearchParams(window.location.search);
const id_pago=urlParams.get("id");

async function cargarRecibo(){

    if(!id_pago) return;

    try{

        const snap=await getDoc(doc(db,"pagos",id_pago));

        if(!snap.exists()){
            document.getElementById("contenido").innerHTML="Pago no encontrado.";
            return;
        }

        const datosPago=snap.data();

        let montoPrestado=0;

        if(datosPago.id_prestamo){

            const snapPrestamo=await getDoc(doc(db,"prestamos",datosPago.id_prestamo));

            if(snapPrestamo.exists()){
                montoPrestado=snapPrestamo.data().monto || 0;
            }

        }

        datosTicket={
            ...datosPago,
            monto_prestamo:montoPrestado
        };

        const pagadas=parseInt(datosTicket.cuotas_pagadas || 0);
        const cuotas=parseInt(datosTicket.cuotas || 0);

        const monto=parseFloat(datosTicket.monto_pagado || 0).toFixed(2);
        const balance=parseFloat(datosTicket.balance_nuevo || 0).toFixed(2);
        const prestado=parseFloat(datosTicket.monto_prestamo || 0).toFixed(2);

        const modalidad=datosTicket.modalidad || datosTicket.tipo || "N/A";

        let fecha="N/A";

        if(datosTicket.fecha){

            try{

                fecha=new Date(datosTicket.fecha).toLocaleString("es-DO");

            }catch{

                fecha=datosTicket.fecha;

            }

        }

        document.getElementById("contenido").innerHTML=`

            <div class="info">
                <span>Fecha:</span>
                <span>${fecha}</span>
            </div>

            <div class="info">
                <span>Cliente:</span>
                <span>${datosTicket.cliente_nombre}</span>
            </div>

            <div class="info">
                <span>Modalidad:</span>
                <span>${modalidad}</span>
            </div>

            <div class="info">
                <span>Préstamo:</span>
                <span>RD$ ${prestado}</span>
            </div>

            <div class="info">
                <span>Abono:</span>
                <span>RD$ ${monto}</span>
            </div>

            <div class="info">
                <span>Cuotas:</span>
                <span>${pagadas}/${cuotas}</span>
            </div>

            <div class="info">
                <span>Balance:</span>
                <span>RD$ ${balance}</span>
            </div>

        `;

    }catch(e){

        console.error(e);

    }

}

async function imprimirBluetooth(){

    if(!datosTicket) return;

    try{

        const pagadas=parseInt(datosTicket.cuotas_pagadas || 0);
        const total=parseInt(datosTicket.cuotas_totales || 0);

        const monto=parseFloat(datosTicket.monto_pagado || 0).toFixed(2);
        const balance=parseFloat(datosTicket.balance_nuevo || 0).toFixed(2);
        const prestado=parseFloat(datosTicket.monto_prestamo || 0).toFixed(2);

        const modalidad=datosTicket.modalidad || datosTicket.tipo || "N/A";

        let fecha="N/A";

        if(datosTicket.fecha){

            try{
                fecha=new Date(datosTicket.fecha).toLocaleString("es-DO");
            }catch{
                fecha=datosTicket.fecha;
            }

        }

        const device=await navigator.bluetooth.requestDevice({
            filters:[{
                services:['000018f0-0000-1000-8000-00805f9b34fb']
            }]
        });

        const server=await device.gatt.connect();

        const service=await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');

        const characteristic=await service.getCharacteristic('00002ae1-0000-1000-8000-00805f9b34fb');

        const texto=
`PRESA-FACIL
COMPROBANTE
--------------------------------
FECHA: ${fecha}
CLIENTE: ${datosTicket.cliente_nombre}
MODALIDAD: ${modalidad}
PRESTAMO: RD$ ${prestado}
ABONO: RD$ ${monto}
CUOTAS: ${pagadas}/${total}
BALANCE: RD$ ${balance}
--------------------------------
GRACIAS


`;

        await characteristic.writeValue(new TextEncoder().encode(texto));

    }catch(e){

        alert("Error Bluetooth.");

    }

}

document.getElementById("btnBluetooth").addEventListener("click",imprimirBluetooth);

cargarRecibo();

</script>

</body>
</html>
