<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de Pago - Prestacóm</title>

<style>
    body { font-family: Arial; background: #f1f5f9; display: flex; justify-content: center; }
    .ticket { width: 320px; background: white; padding: 20px; margin-top: 20px; border: 1px solid #ccc; }
    .center { text-align: center; }
    h2 { font-size: 18px; margin-bottom: 5px; }
    .info { font-size: 14px; margin: 8px 0; }
    .line { border-top: 1px dashed #ccc; margin: 10px 0; }
    .resumen { margin-top: 15px; border-top: 2px solid #000; padding-top: 10px; }
    .monto-final { font-size: 18px; font-weight: bold; text-align: center; margin-top: 10px; }
    .print-btn { width: 100%; padding: 12px; margin-top: 15px; background: #ff6600; border: none; color: white; font-weight: bold; cursor: pointer; }
    @media print { .print-btn { display: none; } body { background: white; } }
</style>
</head>

<body>
<div class="ticket">
    <div class="center">
        <h2>PRESA-FACIL</h2>
        <p class="info">Comprobante de Pago</p>
    </div>
    <div class="line"></div>
    <div id="contenido">Cargando datos...</div>
    <div class="line"></div>
    <button class="print-btn" onclick="window.print()">🖨 Imprimir Recibo</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
        authDomain: "prestacom-sistema-a2830.firebaseapp.com",
        projectId: "prestacom-sistema-a2830",
        storageBucket: "prestacom-sistema-a2830.appspot.com",
        messagingSenderId: "500739174929",
        appId: "1:500739174929:web:1694f07bf65714606f77b0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const id_pago = urlParams.get("id");

    async function cargarRecibo() {
        if (!id_pago) {
            document.getElementById("contenido").innerHTML = "Error: ID no encontrado";
            return;
        }

        const snap = await getDoc(doc(db, "pagos", id_pago));
        if (!snap.exists()) {
            document.getElementById("contenido").innerHTML = "Error: Recibo no encontrado";
            return;
        }

        const data = snap.data();

        const total = parseInt(data.cuotas_totales) || 0;
        const pagadas = parseInt(data.cuotas_pagadas) || 0;
        const faltantes = total - pagadas;

        document.getElementById("contenido").innerHTML = `
            <div class="info"><b>Cliente:</b> ${data.cliente_nombre}</div>
            <div class="info"><b>Fecha:</b> ${new Date(data.fecha).toLocaleString()}</div>
            <div class="line"></div>
            <div class="info"><b>Monto Pagado:</b> RD$ ${parseFloat(data.monto_pagado).toFixed(2)}</div>
            <div class="info"><b>Cuotas:</b> ${pagadas} de ${total}</div>
            <div class="info"><b>Cuotas Faltantes:</b> ${faltantes >= 0 ? faltantes : 0}</div>
            <div class="info"><b>Modalidad:</b> ${data.modalidad || "N/A"}</div>
            <div class="info"><b>Balance Restante:</b> RD$ ${parseFloat(data.balance_nuevo).toFixed(2)}</div>
        `;

        // Impresión y cierre automático
        setTimeout(() => {
            window.print();
            setTimeout(() => window.close(), 1000);
        }, 800);
    }

    cargarRecibo();
</script>
</body>
</html>
