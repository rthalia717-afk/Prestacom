<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=58mm">
    <title>Recibo</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; width: 56mm; margin: 0; padding: 5px; font-size: 14px; font-weight: bold; color: #000; }
        .header { text-align: center; border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; }
        .header h2 { font-size: 18px; margin: 0; text-transform: uppercase; }
        .section-title { border-bottom: 1px solid #000; margin: 10px 0; padding-bottom: 2px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .total-box { border-top: 2px solid #000; border-bottom: 2px solid #000; margin-top: 10px; padding: 8px 0; font-size: 17px; }
        @media print { @page { size: 58mm auto; margin: 0; } body { padding: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <h2>PRESTACOM</h2>
    </div>

    <div id="contenido">
        <div class="section-title">DETALLES</div>
        <div class="row"><span>Fecha:</span> <span id="lbl-fecha">--/--/--</span></div>
        <div class="row"><span>Cliente:</span> <span id="lbl-cliente">...</span></div>
        
        <div class="section-title">PRÉSTAMO</div>
        <div class="row"><span>Cuota # Actual:</span> <span id="lbl-cuota">0</span></div>
        <div class="row"><span>Cuotas Faltantes:</span> <span id="lbl-faltantes">0</span></div>
        <div class="row"><span>Balance:</span> <span>RD$ <span id="lbl-balance">0.00</span></span></div>
        
        <div class="total-box row">
            <span>PAGADO:</span>
            <span>RD$ <span id="lbl-monto">0.00</span></span>
        </div>
    </div>

<script>
    // Helper para decimales
    const fmt = (v) => parseFloat(v || 0).toFixed(2);

    function renderizar() {
        const params = new URLSearchParams(window.location.search);
        const dataBase64 = params.get("data");

        if (dataBase64) {
            const data = JSON.parse(atob(dataBase64)); // Decodificamos
            
            document.getElementById('lbl-fecha').innerText = data.fecha;
            document.getElementById('lbl-cliente').innerText = data.cliente;
            document.getElementById('lbl-cuota').innerText = data.cuota_num;
            document.getElementById('lbl-faltantes').innerText = data.cuotas_faltantes;
            document.getElementById('lbl-balance').innerText = fmt(data.balance);
            document.getElementById('lbl-monto').innerText = fmt(data.pagado);

            setTimeout(() => {
                window.print();
                setTimeout(() => window.history.back(), 1000);
            }, 800);
        } else {
            document.getElementById("contenido").innerHTML = "Error: No se recibieron datos para el recibo.";
        }
    }

    renderizar();
</script>
</body>
</html>
