<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobros - PRESA-FACIL</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; margin: 0; }
        .tarjeta { background: white; padding: 15px; border-radius: 15px; border: 2px solid #0f172a; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .nombre { font-size: 1.2rem; font-weight: 900; }
        .btn-volver { display: block; text-align: center; margin-top: 20px; padding: 15px; background: #ef4444; color: white; border-radius: 15px; text-decoration: none; font-weight: bold; }
        .datos-info { font-size: 0.9rem; color: #334155; margin-top: 5px; }
    </style>
</head>
<body>

    <h2 id="titulo">Cargando...</h2>
    <div id="lista-cobros">Cargando clientes...</div>
    <a href="cobros.html" class="btn-volver">VOLVER</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5oHQtFWzLqY3JdpV_3pKY40rx00o6Gu4",
            authDomain: "prestacom-36ebd.firebaseapp.com",
            projectId: "prestacom-36ebd",
            storageBucket: "prestacom-36ebd.firebasestorage.app",
            messagingSenderId: "787618813060",
            appId: "1:787618813060:web:8bbdc1bea7960cdbad5ed1"
        };
        
        const db = getFirestore(initializeApp(firebaseConfig));
        const listaDiv = document.getElementById('lista-cobros');
        
        // --- CONFIGURACIÓN DE MODALIDAD ---
        const MODALIDAD = 15; // <--- CAMBIAR AQUÍ (1, 7, 15, o 30)
        document.getElementById('titulo').innerText = "PRÉSTAMOS MODALIDAD " + MODALIDAD;

        const q = query(
            collection(db, "prestamos"), 
            where("id_empresa", "==", localStorage.getItem('id_empresa')),
            where("modalidad_dias", "==", MODALIDAD),
            where("status", "==", "Activo")
        );

        onSnapshot(q, (snapshot) => {
            listaDiv.innerHTML = "";
            if (snapshot.empty) { listaDiv.innerHTML = "<p style='text-align:center;'>No hay préstamos activos.</p>"; return; }
            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = "tarjeta";
                // He añadido la visualización de todos los campos solicitados aquí abajo:
                card.innerHTML = `
                    <div>
                        <div class="nombre">${data.nombre_cliente}</div>
                        <div class="datos-info">
                            Monto Prestado: $${data.monto_prestado || 0}<br>
                            Total Cuotas: ${data.total_cuotas || 0} | Pendientes: ${data.cuotas_restantes || 0}<br>
                            Fecha: ${data.fecha_prestamo || 'N/A'}
                        </div>
                    </div>
                    <div style="font-weight:bold;">Cuota: $${data.valor_cuota}</div>
                `;
                card.onclick = () => {
                    localStorage.setItem('cliente_data', JSON.stringify(data));
                    localStorage.setItem('prestamo_id', doc.id);
                    window.location.href = "procesar_pago.html";
                };
                listaDiv.appendChild(card);
            });
        });
    </script>
</body>
</html>
