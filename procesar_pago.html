<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesar Pago - PRESA-FACIL</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; border: 2px solid #0f172a; }
        .input-group { margin: 20px 0; }
        input { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #0f172a; border-radius: 10px; box-sizing: border-box; }
        .btn-pagar { width: 100%; padding: 15px; background: #16a34a; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="nombre-cliente">Cargando...</h2>
        <p>Balance actual: <strong id="balance-actual">$0.00</strong></p>
        
        <div class="input-group">
            <label>Monto a pagar:</label>
            <input type="number" id="txt-monto" placeholder="0.00" oninput="calcular()">
        </div>

        <button class="btn-pagar" onclick="confirmarPago()">PROCESAR PAGO</button>
        <p><a href="cobros.html">Cancelar</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
            authDomain: "prestacom-sistema-a2830.firebaseapp.com",
            projectId: "prestacom-sistema-a2830",
            storageBucket: "prestacom-sistema-a2830.firebasestorage.app",
            messagingSenderId: "500739174929",
            appId: "1:500739174929:web:1694f07bf65714606f77b0"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        // Recuperar datos del cliente desde el localStorage
        const clienteData = JSON.parse(localStorage.getItem('cliente_data'));
        const prestamoId = localStorage.getItem('prestamo_id');
        let balanceActual = parseFloat(clienteData.balance_pendiente) || 0;

        document.getElementById('nombre-cliente').innerText = clienteData.nombre_cliente;
        document.getElementById('balance-actual').innerText = "$" + balanceActual.toFixed(2);

        window.confirmarPago = async () => {
            const montoPagado = parseFloat(document.getElementById('txt-monto').value);
            
            if (isNaN(montoPagado) || montoPagado <= 0) {
                alert("Ingrese un monto válido");
                return;
            }

            const nuevoBalance = balanceActual - montoPagado;
            
            // LÓGICA DE ESTADO: Solo se marca como Finalizado si el balance es <= 0
            const nuevoStatus = (nuevoBalance <= 0) ? 'Finalizado' : 'Activo';

            try {
                const prestamoRef = doc(db, "prestamos", prestamoId);
                
                // ACTUALIZACIÓN SEGURA: updateDoc no borra los otros campos
                await updateDoc(prestamoRef, {
                    balance_pendiente: nuevoBalance,
                    status: nuevoStatus
                });

                alert("Pago registrado. Nuevo balance: $" + nuevoBalance.toFixed(2));
                window.location.href = "cobros.html";
            } catch (error) {
                console.error("Error al actualizar:", error);
                alert("Error al guardar en la base de datos.");
            }
        };
    </script>
</body>
</html>
