<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PROCESAR COBRO</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .contenedor-cobro { background: white; padding: 25px; border-radius: 20px; border: 2px solid #0f172a; width: 90%; max-width: 400px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .campo { margin-bottom: 15px; font-size: 16px; color: #333; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #0f172a; border-radius: 10px; font-size: 1.5rem; text-align: center; box-sizing: border-box; }
        .btn-cobrar { width: 100%; padding: 15px; background: #f97316; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-cobrar:disabled { background: #94a3b8; }
    </style>
</head>
<body>

    <div class="contenedor-cobro" id="app">
        <h2 style="text-align:center;">PROCESAR COBRO</h2>
        <div id="diagnostico">Cargando datos del préstamo...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5oHQtFWzLqY3JdpV_3pKY40rx00o6Gu4",
            authDomain: "prestacom-36ebd.firebaseapp.com",
            projectId: "prestacom-36ebd",
            storageBucket: "prestacom-36ebd.firebasestorage.app",
            messagingSenderId: "787618813060",
            appId: "1:787618813060:web:8bbdc1bea7960cdbad5ed1"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const divInfo = document.getElementById('diagnostico');
        
        // Obtenemos y limpiamos el ID
        const rawId = localStorage.getItem('prestamo_id');
        const prestamoId = rawId ? rawId.trim() : null;

        async function cargar() {
            if (!prestamoId) {
                divInfo.innerHTML = "Error: No se encontró un ID de préstamo en memoria. Por favor, selecciona uno desde el diario.";
                return;
            }

            try {
                // Depuración técnica
                console.log("Buscando en colección 'prestamos' con ID:", prestamoId);
                
                const docRef = doc(db, "prestamos", prestamoId);
                const snap = await getDoc(docRef);

                if (!snap.exists()) {
                    divInfo.innerHTML = `
                        <div style="color:red;">
                            <strong>Error:</strong> El préstamo ID [${prestamoId}] no existe en la colección 'prestamos'.
                            <br><br>Si cambiaste la estructura de tu base de datos, verifica que la colección sea la correcta.
                        </div>`;
                    return;
                }

                const d = snap.data();
                divInfo.innerHTML = `
                    <div class="campo">Cliente: <b>${d.nombre_cliente || 'N/A'}</b></div>
                    <div class="campo">Pendiente: <b>$${parseFloat(d.balance_pendiente || 0).toFixed(2)}</b></div>
                    <input type="number" id="monto" value="${parseFloat(d.valor_cuota || 0).toFixed(2)}">
                    <button class="btn-cobrar" id="btn-pago">REALIZAR PAGO</button>
                `;

                document.getElementById('btn-pago').onclick = () => procesar(d.nombre_cliente);

            } catch (e) {
                divInfo.innerHTML = "Error de conexión: " + e.message;
            }
        }

        async function procesar(nombre) {
            const monto = parseFloat(document.getElementById('monto').value);
            const btn = document.getElementById('btn-pago');
            
            btn.disabled = true;
            try {
                await updateDoc(doc(db, "prestamos", prestamoId), {
                    balance_pendiente: increment(-monto),
                    numero_cuota: increment(1)
                });
                alert("¡Pago exitoso!");
                window.location.href = "diario.html";
            } catch (e) {
                alert("Error al procesar: " + e.message);
                btn.disabled = false;
            }
        }

        cargar();
    </script>
</body>
</html>
