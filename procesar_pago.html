<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROCESAR COBRO</title>
    <style>
        /* CSS FUERTE: Para ignorar inyecciones externas */
        body { 
            font-family: sans-serif !important; 
            background: #f1f5f9 !important; 
            display: flex !important; 
            justify-content: center !important; 
            align-items: center !important; 
            min-height: 100vh !important; 
            margin: 0 !important; 
        }
        .contenedor-cobro { 
            background: white !important; 
            padding: 25px !important; 
            border-radius: 20px !important; 
            border: 2px solid #0f172a !important; 
            width: 90% !important; 
            max-width: 400px !important; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.1) !important;
            box-sizing: border-box !important;
        }
        .campo { margin-bottom: 15px !important; font-size: 16px !important; color: #333 !important; }
        input { width: 100% !important; padding: 15px !important; margin: 10px 0 !important; border: 2px solid #0f172a !important; border-radius: 10px !important; font-size: 1.5rem !important; text-align: center !important; box-sizing: border-box !important; }
        .btn-cobrar { width: 100% !important; padding: 15px !important; background: #f97316 !important; color: white !important; border: none !important; border-radius: 10px !important; font-weight: bold !important; cursor: pointer !important; }
    </style>
</head>
<body>

    <div class="contenedor-cobro" id="app">
        <h2 style="text-align:center;">PROCESAR COBRO</h2>
        <div id="diagnostico">Cargando...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDlVPO8P6oceu2RyVZA_bjak7bvAEXxvQk",
            authDomain: "prestacom-sistema.firebaseapp.com",
            projectId: "prestacom-sistema",
            storageBucket: "prestacom-sistema.firebasestorage.app",
            messagingSenderId: "263392324772",
            appId: "1:263392324772:web:2d83308890ddaef7e84a31"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const prestamoId = localStorage.getItem('prestamo_id');
        const divInfo = document.getElementById('diagnostico');

        async function cargar() {
            if (!prestamoId) {
                divInfo.innerHTML = "Error: No hay ID en LocalStorage. Verifica que el botón de 'Cobrar' en la lista realmente esté guardando el ID.";
                return;
            }

            try {
                const snap = await getDoc(doc(db, "prestamos", prestamoId));
                if (!snap.exists()) {
                    divInfo.innerHTML = "Error: El ID [" + prestamoId + "] no existe en la base de datos 'prestamos'.";
                    return;
                }

                const d = snap.data();
                // Renderizado
                divInfo.innerHTML = `
                    <div class="campo">Cliente: <b>${d.nombre_cliente || 'N/A'}</b></div>
                    <div class="campo">Pendiente: <b>$${parseFloat(d.balance_pendiente || 0).toFixed(2)}</b></div>
                    <input type="number" id="monto" value="${parseFloat(d.valor_cuota || 0).toFixed(2)}">
                    <button class="btn-cobrar" id="btn-pago">REALIZAR PAGO</button>
                `;

                document.getElementById('btn-pago').onclick = () => procesar(d.nombre_cliente);

            } catch (e) {
                divInfo.innerHTML = "Error de conexión: " + e.message;
            }
        }

        async function procesar(nombre) {
            const monto = parseFloat(document.getElementById('monto').value);
            const btn = document.getElementById('btn-pago');
            
            btn.disabled = true;
            try {
                await updateDoc(doc(db, "prestamos", prestamoId), {
                    balance_pendiente: increment(-monto),
                    numero_cuota: increment(1)
                });
                alert("¡Pago exitoso!");
                window.location.href = "diario.html";
            } catch (e) {
                alert("Error: " + e.message);
                btn.disabled = false;
            }
        }

        cargar();
    </script>
</body>
</html>
