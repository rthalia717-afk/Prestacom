<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTACOM 2.0 - Cobros</title>
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1e293b; --accent: #ff6600; --bg: #f1f5f9; --surface: #ffffff; --text: #334155; --texto-izq: #16a34a; --texto-der: #1d4ed8; }
        body { background-color: var(--bg); font-family: sans-serif; padding-bottom: 30px; }
        .header { background-color: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .tarjeta { background: var(--surface); border: 1px solid #cbd5e1; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .btn-cobrar { background-color: var(--accent); color: white; width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">PRESTACOM 2.0</div>
    <div class="container">
        <div id="vista-listado">
            <div id="lista-clientes">Cargando clientes...</div>
        </div>

        <div id="vista-procesar" style="display: none;">
            <div class="tarjeta">
                <div class="info-row"><span>Cliente:</span><span id="lbl-cliente">--</span></div>
                <div class="info-row"><span>Pendiente:</span><span id="lbl-balance">$0.00</span></div>
                <input type="number" id="txt-monto" placeholder="Monto a cobrar" style="width:100%; padding:10px; margin:10px 0;">
                <button class="btn-cobrar" onclick="procesarPago()">Confirmar Pago</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
            authDomain: "prestacom-sistema-a2830.firebaseapp.com",
            projectId: "prestacom-sistema-a2830",
            storageBucket: "prestacom-sistema-a2830.firebasestorage.app",
            messagingSenderId: "500739174929",
            appId: "1:500739174929:web:1694f07bf65714606f77b0"
            
            
     };
        const db = getFirestore(initializeApp(firebaseConfig));
        
        let prestamoActual = null;
        const idEmpresa = "TU_ID_EMPRESA"; // Asegúrate de tener esto configurado

        async function cargarClientes() {
            const container = document.getElementById('lista-clientes');
            const q = query(collection(db, "prestamos"), where("id_empresa", "==", idEmpresa), where("status", "==", "Activo"));
            const snap = await getDocs(q);
            container.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                container.innerHTML += `
                    <div class="tarjeta" onclick="abrirCobro('${d.id}')">
                        <h4>${p.nombre_cliente}</h4>
                        <p>Debe: $${p.cuotas_restantes * p.valor_cuota}</p>
                    </div>`;
            });
        }

        window.abrirCobro = async (id) => {
            // Aquí buscarías el préstamo en caché o Firestore
            // Por brevedad, este es el flujo lógico
            document.getElementById('vista-listado').style.display = "none";
            document.getElementById('vista-procesar').style.display = "block";
        };

        window.procesarPago = async () => {
            // 1. Lógica de actualización de cuotas
            // 2. addDoc a la colección "pagos"
            // 3. Imprimir ticket vía rawBT
            alert("Procesando pago...");
        };

        cargarClientes();
    </script>
</body>
</html>
