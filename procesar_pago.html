<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTACOM 2.0 - Cobros</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; border: 2px solid #0f172a; max-width: 400px; margin: auto; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #ccc; font-weight: bold; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #0f172a; border-radius: 10px; font-size: 1.5rem; text-align: center; }
        .btn-pay { width: 100%; padding: 18px; background: #f97316; color: white; border: none; border-radius: 10px; font-weight: 900; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="card" id="app-box">
        <h2 style="text-align:center;">PROCESAR COBRO</h2>
        <div id="info-credito">Cargando datos del préstamo...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // CONFIGURACIÓN (REEMPLAZA CON LA TUYA SI ES NECESARIO)
        const firebaseConfig = {
            apiKey: "AIzaSyDlVPO8P6oceu2RyVZA_bjak7bvAEXxvQk",
            authDomain: "prestacom-sistema.firebaseapp.com",
            projectId: "prestacom-sistema",
            storageBucket: "prestacom-sistema.firebasestorage.app",
            messagingSenderId: "263392324772",
            appId: "1:263392324772:web:2d83308890ddaef7e84a31"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        
        // Recuperar ID desde localStorage (pasado desde tu lista de préstamos)
        const prestamoId = localStorage.getItem('prestamo_id');
        
        async function cargarDatosYRenderizar() {
            if (!prestamoId) return alert("Error: No se seleccionó un préstamo");

            const docRef = doc(db, "prestamos", prestamoId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                const nombre = data.nombre_cliente || "Cliente";
                const balance = parseFloat(data.balance_pendiente) || 0;
                const totalCuotas = parseInt(data.total_cuotas) || 0;
                const cuotaActual = parseInt(data.numero_cuota) || 1;
                const valorCuota = parseFloat(data.valor_cuota) || 0;
                const restantes = Math.max(0, totalCuotas - cuotaActual + 1);

                document.getElementById('info-credito').innerHTML = `
                    <div class="row"><span>Cliente:</span> <span>${nombre}</span></div>
                    <div class="row"><span>Balance:</span> <span style="color:red;">$${balance.toFixed(2)}</span></div>
                    <div class="row"><span>Cuota:</span> <span>#${cuotaActual}</span></div>
                    <div class="row"><span>Restantes:</span> <span>${restantes}</span></div>
                    <input type="number" id="monto-pagar" value="${valorCuota.toFixed(2)}">
                    <button class="btn-pay" id="btn-procesar">REALIZAR PAGO E IMPRIMIR</button>
                `;

                document.getElementById('btn-procesar').onclick = () => ejecutarPago(data, nombre, cuotaActual);
            }
        }

        async function ejecutarPago(data, nombre, cuotaNum) {
            const btn = document.getElementById('btn-procesar');
            const monto = parseFloat(document.getElementById('monto-pagar').value);
            
            if (isNaN(monto) || monto <= 0) return alert("Ingrese un monto válido");

            btn.disabled = true;
            btn.innerText = "Procesando...";

            try {
                // Actualizar Firebase
                await updateDoc(doc(db, "prestamos", prestamoId), {
                    balance_pendiente: increment(-monto),
                    numero_cuota: increment(1)
                });

                // Generar Ticket
                const ticket = `--- PRESTACOM ---\nCLIENTE: ${nombre}\nPAGO: $${monto.toFixed(2)}\nCUOTA #: ${cuotaNum}\nFECHA: ${new Date().toLocaleString()}\n-----------------\n¡GRACIAS!\n\n\n`;
                window.location.href = "rawbt:base64," + btoa(unescape(encodeURIComponent(ticket)));
                
                alert("¡Pago registrado correctamente!");
                window.location.href = "diario.html";
            } catch (e) {
                alert("Error: " + e.message);
                btn.disabled = false;
                btn.innerText = "REALIZAR PAGO E IMPRIMIR";
            }
        }

        cargarDatosYRenderizar();
    </script>
</body>
</html>
