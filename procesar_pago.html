<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesar Cobro - PRESA-FACIL</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .contenedor-cobro { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .header-info { text-align: center; margin-bottom: 25px; }
        .nombre-cliente { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin-bottom: 5px; }
        .saldo-pendiente { font-size: 1.1rem; color: #64748b; background: #f8fafc; padding: 10px; border-radius: 10px; display: inline-block; }
        .label-input { font-weight: 600; color: #475569; margin-left: 5px; }
        input { width: 100%; padding: 18px; margin: 10px 0 20px 0; border: 3px solid #0f172a; border-radius: 12px; font-size: 2rem; font-weight: bold; text-align: center; box-sizing: border-box; color: #0f172a; }
        .btn-cobrar { width: 100%; padding: 18px; background: #f97316; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn-cobrar:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-cobrar:hover:not(:disabled) { background: #ea580c; }
    </style>
</head>
<body>

    <div class="contenedor-cobro">
        <div id="diagnostico" style="text-align: center;">Cargando información...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
            authDomain: "prestacom-sistema-a2830.firebaseapp.com",
            projectId: "prestacom-sistema-a2830",
            storageBucket: "prestacom-sistema-a2830.firebasestorage.app",
            messagingSenderId: "500739174929",
            appId: "1:500739174929:web:1694f07bf65714606f77b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const divInfo = document.getElementById('diagnostico');
        const prestamoId = localStorage.getItem('prestamo_id');

        async function cargar() {
            if (!prestamoId) {
                divInfo.innerHTML = "Error: No se seleccionó préstamo.";
                return;
            }

            try {
                const snap = await getDoc(doc(db, "prestamos", prestamoId));
                if (!snap.exists()) {
                    divInfo.innerHTML = "Préstamo no encontrado.";
                    return;
                }
                const d = snap.data();
                
                divInfo.innerHTML = `
                    <div class="header-info">
                        <div class="nombre-cliente">${d.nombre_cliente}</div>
                        <div class="saldo-pendiente">Pendiente: <b>$${parseFloat(d.balance_pendiente || 0).toFixed(2)}</b></div>
                    </div>
                    <div class="label-input">Monto a cobrar ($):</div>
                    <input type="number" id="monto-input" value="${parseFloat(d.valor_cuota || 0).toFixed(2)}">
                    <button class="btn-cobrar" id="btn-pago">CONFIRMAR PAGO</button>
                `;

                document.getElementById('btn-pago').onclick = () => procesar(d);
            } catch (error) {
                divInfo.innerHTML = "Error al cargar datos.";
                console.error(error);
            }
        }

        async function procesar(d) {
            const btn = document.getElementById('btn-pago');
            const montoInput = document.getElementById('monto-input').value;
            const monto = parseFloat(montoInput);
            
            if (isNaN(monto) || monto <= 0) {
                alert("Ingrese un monto válido");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Procesando...";

            const datosTicket = {
                cliente: d.nombre_cliente,
                fecha: new Date().toLocaleDateString(),
                cuota_num: (d.total_cuotas - d.cuotas_restantes) + 1,
                cuotas_restantes: d.cuotas_restantes - 1,
                monto_pagado: monto
            };
            localStorage.setItem('ultimo_ticket', JSON.stringify(datosTicket));

            const saldoActual = parseFloat(d.balance_pendiente || 0);
            const nuevoSaldo = saldoActual - monto;

            try {
                await updateDoc(doc(db, "prestamos", prestamoId), {
                    balance_pendiente: nuevoSaldo,
                    cuotas_restantes: increment(-1)
                });

                // --- NUEVA LÓGICA: Apertura en ventana emergente ---
                //window.open('ticket.html', 'ImprimirTicket', 'width=400,height=600');
                window.location.href = "ticket.html";
                
                // Redirigimos al usuario al diario inmediatamente
                window.location.href = "diario.html";
                
            } catch (error) {
                console.error("Error al procesar:", error);
                alert("Error al guardar el pago. Verifica tu conexión.");
                btn.disabled = false;
                btn.innerText = "CONFIRMAR PAGO";
            }
        }

        cargar();
    </script>
</body>
</html>
