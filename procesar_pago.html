<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROCESAR COBRO</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; border: 2px solid #0f172a; max-width: 400px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #ccc; font-weight: bold; color: #1e293b; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #0f172a; border-radius: 10px; font-size: 1.8rem; font-weight: bold; box-sizing: border-box; text-align: center; }
        .btn-pay { width: 100%; padding: 18px; background: #f97316; color: white; border: none; border-radius: 10px; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: transform 0.1s; }
        .btn-pay:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="text-align:center; color: #1e293b;">PROCESAR COBRO</h2>
        <div id="info-credito">Cargando datos...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // CONFIGURACIÓN (Asegúrate de que sea la misma que en cobros.html)
        const firebaseConfig = {
            apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
            authDomain: "prestacom-sistema-a2830.firebaseapp.com",
            projectId: "prestacom-sistema-a2830",
            storageBucket: "prestacom-sistema-a2830.firebasestorage.app",
            messagingSenderId: "500739174929",
            appId: "1:500739174929:web:1694f07bf65714606f77b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const data = JSON.parse(localStorage.getItem('cliente_data'));
        const prestamoId = localStorage.getItem('prestamo_id');
        const infoDiv = document.getElementById('info-credito');
        
        infoDiv.innerHTML = `
            <div class="row"><span>Cliente:</span> <span>${data.nombre_cliente}</span></div>
            <div class="row"><span>Balance:</span> <span style="color:red;">$${data.balance_pendiente}</span></div>
            <div class="row"><span>Cuota:</span> <span>#${data.numero_cuota} de ${data.total_cuotas}</span></div>
            <input type="number" id="monto-pagar" value="${data.valor_cuota}">
            <button class="btn-pay" id="btn-procesar">REALIZAR PAGO E IMPRIMIR</button>
        `;

        document.getElementById('btn-procesar').onclick = async () => {
            const btn = document.getElementById('btn-procesar');
            const montoPagado = parseFloat(document.getElementById('monto-pagar').value);
            
            if (isNaN(montoPagado) || montoPagado <= 0) {
                alert("Ingrese un monto válido");
                return;
            }

            btn.innerText = "Procesando...";
            btn.disabled = true;

            try {
                // Actualización atómica en Firebase
                await updateDoc(doc(db, "prestamos", prestamoId), {
                    balance_pendiente: increment(-montoPagado),
                    numero_cuota: increment(1)
                });

                // Ticket
                const ticket = `--- PRESTACOM ---\nCLIENTE: ${data.nombre_cliente}\nPAGO: $${montoPagado.toFixed(2)}\nFECHA: ${new Date().toLocaleString()}\n-----------------\n¡GRACIAS!\n\n\n`;
                
                window.location.href = "rawbt:base64," + btoa(unescape(encodeURIComponent(ticket)));
                
                alert("¡Pago exitoso!");
                window.location.href = "diario.html";
            } catch (e) {
                alert("Error: " + e.message);
                btn.innerText = "REALIZAR PAGO E IMPRIMIR";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
