<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTACOM 2.0 - Nuevo Cliente</title>
    <link rel="stylesheet" href="css/variable.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--color-background, #f1f5f9); color: var(--color-text-main, #334155); display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 480px; background-color: var(--color-background, #f1f5f9); display: flex; flex-direction: column; position: relative; }
        header { background-color: var(--color-primary, #1e293b); color: white; padding: 15px 20px; display: flex; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 10; }
        .back-btn { text-decoration: none; color: white; font-size: 1.5rem; margin-right: 15px; }
        header h1 { font-size: 1.25rem; font-weight: bold; }
        form { padding: 20px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 90px; }
        .form-section { background-color: var(--color-surface, #ffffff); border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02); border: 1px solid rgba(0,0,0,0.03); }
        .section-title { font-size: 0.9rem; color: var(--color-primary, #ff6600); font-weight: 700; text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid rgba(255, 102, 0, 0.1); padding-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        label { font-size: 0.85rem; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 0.95rem; background-color: #FAFAFA; }
        textarea { resize: none; height: 70px; }
        .btn-gps-locator { width: 100%; background-color: #111827; color: #FFFFFF; border: none; border-radius: 8px; padding: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 5px; }
        .btn-gps-locator.success { background-color: #22c55e; }
        .footer-action { position: fixed; bottom: 0; width: 100%; max-width: 480px; background-color: var(--color-background, #f1f5f9); padding: 15px 20px; box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.08); z-index: 100; }
        .submit-btn { width: 100%; background-color: #FF6600; color: #FFFFFF; border: none; border-radius: 8px; padding: 14px; font-size: 1.05rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <a href="index.html" class="back-btn">⬅</a>
            <h1>Nuevo Cliente</h1>
        </header>

        <form id="form-nuevo-cliente">
            <div class="form-section">
                <div class="section-title">Datos Personales</div>
                <div class="input-group"><label>Cédula</label><input type="text" id="cedula" required></div>
                <div class="input-group"><label>Nombre Completo</label><input type="text" id="nombre" required></div>
                <div class="input-group"><label>Apodo (Opcional)</label><input type="text" id="apodo"></div>
            </div>

            <div class="form-section">
                <div class="section-title">Contacto y Ruta</div>
                <div class="input-group"><label>Teléfono</label><input type="tel" id="telefono" required></div>
                <div class="input-group"><label>Sector / Zona</label><input type="text" id="sector" required></div>
                <div class="input-group"><label>Dirección</label><textarea id="direccion" required></textarea></div>
                <input type="hidden" id="latitud"><input type="hidden" id="longitud">
                <button type="button" id="btn-gps" class="btn-gps-locator" onclick="obtenerCoordenadasCelular()">
                    <i class='bx bx-current-location'></i> <span id="txt-gps">Fijar Ubicación GPS</span>
                </button>
            </div>

            <div class="form-section">
                <div class="section-title">Evaluación Financiera</div>
                <div class="input-group"><label>Ingresos Mensuales ($)</label><input type="number" id="ingresos" required></div>
                <div class="input-group"><label>Ocupación</label><input type="text" id="ocupacion" required></div>
            </div>

            <div class="footer-action">
                <button type="submit" class="submit-btn" id="btn-guardar">Guardar Cliente</button>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5oHQtFWzLqY3JdpV_3pKY40rx00o6Gu4",
            authDomain: "prestacom-36ebd.firebaseapp.com",
            projectId: "prestacom-36ebd",
            storageBucket: "prestacom-36ebd.firebasestorage.app",
            messagingSenderId: "787618813060",
            appId: "1:787618813060:web:8bbdc1bea7960cdbad5ed1"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const idEmpresa = localStorage.getItem('id_empresa');
        if (!idEmpresa) window.location.href = "login.html";

        window.obtenerCoordenadasCelular = () => {
            const btn = document.getElementById('btn-gps');
            if (!navigator.geolocation) return alert("GPS no disponible");
            navigator.geolocation.getCurrentPosition((pos) => {
                document.getElementById('latitud').value = pos.coords.latitude;
                document.getElementById('longitud').value = pos.coords.longitude;
                btn.classList.add('success');
                document.getElementById('txt-gps').innerText = "✓ Ubicación capturada";
            }, () => alert("Error al obtener GPS"));
        };

        document.getElementById('form-nuevo-cliente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar');
            btn.disabled = true;
            btn.innerText = "Guardando...";

            try {
                await addDoc(collection(db, "clientes_prestamo"), {
                    id_empresa: idEmpresa,
                    cedula: document.getElementById('cedula').value,
                    nombre: document.getElementById('nombre').value,
                    apodo: document.getElementById('apodo').value,
                    telefono: document.getElementById('telefono').value,
                    ruta_sector: document.getElementById('sector').value,
                    direccion: document.getElementById('direccion').value,
                    latitud: document.getElementById('latitud').value ? Number(document.getElementById('latitud').value) : null,
                    longitud: document.getElementById('longitud').value ? Number(document.getElementById('longitud').value) : null,
                    ingresos: Number(document.getElementById('ingresos').value),
                    ocupacion: document.getElementById('ocupacion').value,
                    fecha_registro: new Date().toISOString()
                });
                alert("Cliente guardado con éxito");
                window.location.href = "clientes.html";
            } catch (err) {
                console.error(err);
                alert("Error al guardar en la base de datos");
                btn.disabled = false;
                btn.innerText = "Guardar Cliente";
            }
        });
    </script>
</body>
</html>
