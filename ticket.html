<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recibo de Pago</title>
    <style>
        body { font-family: 'Courier New', monospace; width: 72mm; margin: 0; padding: 5px; font-size: 13px; color: #000; }
        .header { text-align: center; border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; }
        .titulo-ticket { font-size: 16px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .sub-titulo { font-size: 11px; margin: 2px 0; }
        .seccion { margin: 8px 0; border-bottom: 1px dashed #000; padding-bottom: 5px; }
        .campo { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .label { font-weight: 900; }
        .valor { font-weight: normal; }
        .total-box { border: 2px solid #000; padding: 8px; text-align: center; margin: 10px 0; font-size: 15px; font-weight: 900; }
        .footer { text-align: center; font-size: 11px; margin-top: 10px; }
        @media print { @page { margin: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <h2 class="titulo-ticket" id="empresa-nombre">PRESTACOM</h2>
        <p class="sub-titulo">COMPROBANTE DE PAGO</p>
        <p id="lbl-fecha-hora"></p>
    </div>

    <div class="seccion">
        <div class="campo"><span class="label">CLIENTE:</span> <span class="valor" id="lbl-cliente"></span></div>
    </div>

    <div class="seccion">
        <div class="campo"><span class="label">PAGO N°:</span> <span class="valor" id="lbl-pago-num"></span></div>
        <div class="campo"><span class="label">CUOTA:</span> <span class="valor" id="lbl-cuota-actual"></span></div>
        <div class="campo"><span class="label">PENDIENTES:</span> <span class="valor" id="lbl-restantes"></span></div>
    </div>

    <div class="total-box">
        TOTAL PAGADO: RD$ <span id="lbl-monto"></span>
    </div>

    <div class="footer">
        <p id="footer-msg">¡Gracias por su pago!</p>
        <p>Recibido por: <span id="lbl-cobrador"></span></p>
    </div>

    <script>
        const ticket = JSON.parse(localStorage.getItem('ultimo_ticket'));
        if (ticket) {
            document.getElementById('empresa-nombre').innerText = (localStorage.getItem('ticket_nombre') || "PRESTACOM").toUpperCase();
            document.getElementById('lbl-fecha-hora').innerText = new Date().toLocaleString();
            document.getElementById('lbl-cliente').innerText = ticket.cliente;
            document.getElementById('lbl-pago-num').innerText = ticket.cuota_num;
            document.getElementById('lbl-cuota-actual').innerText = "RD$ " + ticket.monto_pagado.toFixed(2);
            document.getElementById('lbl-restantes').innerText = ticket.cuotas_restantes;
            document.getElementById('lbl-monto').innerText = ticket.monto_pagado.toFixed(2);
            document.getElementById('lbl-cobrador').innerText = (localStorage.getItem('nombre_usuario') || "SISTEMA").toUpperCase();

            window.print();
            setTimeout(() => { window.location.href = localStorage.getItem('pagina_origen') || "diarios.html"; }, 1500);
        } else {
            alert("No hay datos para imprimir.");
            window.history.back();
        }
    </script>
</body>
</html>
