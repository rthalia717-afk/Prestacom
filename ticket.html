<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ticket</title>
    <style>
        body { font-family: 'Courier New', monospace; width: 100%; font-size: 16px; color: #000; line-height: 1.2; }
        .center { text-align: center; }
        .line { border-bottom: 1px dashed #000; margin: 5px 0; }
        .bold { font-weight: bold; }
    </style>
</head>
<body>
    <div class="center">
        <h2 id="empresa-nombre" style="margin:0;">PRESTACOM</h2>
        <p style="margin:0;" id="empresa-tel">---</p>
    </div>
    
    <div class="line"></div>
    <div class="bold">DETALLES DE COBRO</div>
    <div>FECHA: <span id="lbl-fecha">---</span></div>
    <div>CLIENTE: <span id="lbl-cliente">---</span></div>
    <div>COBRADOR: <span id="lbl-mensajero">---</span></div>

    <div class="line"></div>
    <div class="bold">ESTADO DEL PRESTAMO</div>
    <div>CUOTA #: <span id="lbl-cuota">---</span></div>
    <div>RESTANTES: <span id="lbl-restantes">---</span></div>
    
    <div class="line"></div>
    <div class="bold" style="font-size: 18px;">TOTAL: RD$ <span id="lbl-monto">0.00</span></div>
    <div class="line"></div>

    <div class="center" style="margin-top:10px;">
        <p id="footer-msg">GRACIAS POR SU PREFERENCIA</p>
    </div>

    <script>
        window.onload = function() {
            const ticket = JSON.parse(localStorage.getItem('ultimo_ticket'));
            if (ticket) {
                document.getElementById('empresa-nombre').innerText = (localStorage.getItem('ticket_nombre') || "PRESTACOM").toUpperCase();
                document.getElementById('empresa-tel').innerText = "TEL: " + (localStorage.getItem('ticket_tel') || "---");
                document.getElementById('lbl-fecha').innerText = ticket.fecha;
                document.getElementById('lbl-cliente').innerText = (ticket.cliente || "---").toUpperCase();
                document.getElementById('lbl-mensajero').innerText = (localStorage.getItem('nombre_usuario') || "SISTEMA").toUpperCase();
                document.getElementById('lbl-restantes').innerText = ticket.cuotas_restantes ?? "---";
                document.getElementById('lbl-cuota').innerText = ticket.cuota_num || "---";
                document.getElementById('lbl-monto').innerText = parseFloat(ticket.monto_pagado || 0).toLocaleString('es-DO', {minimumFractionDigits: 2});
                document.getElementById('footer-msg').innerText = (localStorage.getItem('ticket_footer') || "GRACIAS POR SU PREFERENCIA").toUpperCase();

                // Imprimir y volver
                setTimeout(() => { 
                    window.print(); 
                    setTimeout(() => { window.location.href = "diario.html"; }, 1000);
                }, 500);
            } else {
                window.location.href = "diario.html";
            }
        };
    </script>
</body>
</html>
