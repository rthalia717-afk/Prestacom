<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Imprimir Recibo</title>
    <style>
        body { font-family: 'Courier New', monospace; width: 75mm; margin: 0 auto; padding: 10px; font-size: 14px; color: #000; font-weight: 700; }
        .header { text-align: center; border-bottom: 3px solid #000; margin-bottom: 12px; padding-bottom: 6px; }
        .header h2 { font-size: 20px; margin: 0; text-transform: uppercase; }
        .row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .total-box { background-color: #000; color: #fff; margin: 15px 0; padding: 10px; text-align: center; }
        .total-box span { color: #fff !important; }
        .firma { margin-top: 30px; text-align: center; border-top: 1px solid #000; padding-top: 5px; }
        @media print { body { margin: 0; } .total-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
    </style>
</head>
<body>
    <div class="header">
        <h2 id="empresa-nombre">PRESTACOM</h2>
        <p>RECIBO DE PAGO</p>
    </div>
    <div class="row"><span>FECHA:</span> <span id="lbl-fecha"></span></div>
    <div class="row"><span>CLIENTE:</span> <span id="lbl-cliente"></span></div>
    <div class="row"><span>CUOTA:</span> <span id="lbl-cuota"></span></div>
    <div class="total-box"><span>TOTAL: RD$ <span id="lbl-monto"></span></span></div>
    <div class="firma">FIRMA CLIENTE</div>

    <script>
        window.onload = function() {
            const ticket = JSON.parse(localStorage.getItem('ultimo_ticket'));
            if (ticket) {
                document.getElementById('empresa-nombre').innerText = (localStorage.getItem('ticket_nombre') || "PRESTACOM").toUpperCase();
                document.getElementById('lbl-fecha').innerText = ticket.fecha;
                document.getElementById('lbl-cliente').innerText = ticket.cliente;
                document.getElementById('lbl-cuota').innerText = ticket.cuota_num;
                document.getElementById('lbl-monto').innerText = parseFloat(ticket.monto_pagado).toLocaleString('es-DO', {minimumFractionDigits: 2});
                
                // Imprimir y cerrar ventana
                setTimeout(() => { window.print(); window.close(); }, 500);
            }
        };
    </script>
</body>
</html>
