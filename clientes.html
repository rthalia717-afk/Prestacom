<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        if (!localStorage.getItem('id_empresa')) window.location.replace("login.html");
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Clientes - PRESTACOM</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f1f5f9; padding-bottom: 20px; }
        header { background: #111827; color: white; padding: 20px; display: flex; align-items: center; }
        .back-btn { color: white; text-decoration: none; font-size: 1.5rem; margin-right: 15px; }
        .container { padding: 20px; max-width: 480px; margin: auto; }
        
        /* Tarjeta de cliente */
        .cliente-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .info h3 { font-size: 1rem; color: #1e293b; }
        .info p { font-size: 0.8rem; color: #64748b; }
        .btn-ver { background: #FF6600; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <a href="panel.html" class="back-btn">⬅</a>
        <h1>Mis Clientes</h1>
    </header>

    <div class="container" id="lista-clientes">
        <p style="text-align: center; color: #94a3b8;">Cargando clientes...</p>
    </div>

    <script type="module">
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

       // const firebaseConfig = { /* Usa el mismo objeto que en tu otro archivo */
         //   apiKey: "AIzaSyDlVPO8P6oceu2RyVZA_bjak7bvAEXxvQk",
           // projectId: "prestacom-sistema"
        //};


const firebaseConfig = {
            apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
            authDomain: "prestacom-sistema-a2830.firebaseapp.com",
            projectId: "prestacom-sistema-a2830",
            storageBucket: "prestacom-sistema-a2830.firebasestorage.app",
            messagingSenderId: "500739174929",
            appId: "1:500739174929:web:1694f07bf65714606f77b0"
        };



        

        const db = getFirestore(initializeApp(firebaseConfig));
        const idEmpresa = localStorage.getItem('id_empresa');
        const listaClientes = document.getElementById('lista-clientes');

        async function cargarClientes() {
            try {
                const q = query(collection(db, "clientes_prestamo"), where("id_empresa", "==", idEmpresa));
                const querySnapshot = await getDocs(q);
                
                listaClientes.innerHTML = ""; // Limpiar mensaje de carga

                if (querySnapshot.empty) {
                    listaClientes.innerHTML = "<p style='text-align:center;'>No tienes clientes registrados.</p>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const c = doc.data();
                    const div = document.createElement('div');
                    div.className = 'cliente-card';
                    div.innerHTML = `
                        <div class="info">
                            <h3>${c.nombre}</h3>
                            <p>Cédula: ${c.cedula} | Tel: ${c.telefono}</p>
                        </div>
                        <button class="btn-ver" onclick="alert('Detalle de ${c.nombre}')">Ver</button>
                    `;
                    listaClientes.appendChild(div);
                });
            } catch (error) {
                console.error("Error:", error);
                listaClientes.innerHTML = "<p>Error al cargar clientes.</p>";
            }
        }

        cargarClientes();
    </script>
</body>
</html>
