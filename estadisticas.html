<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTACOM | Dashboard Pro</title>
    <style>
        :root {
            --bg: #0F172A;
            --surface: #1E293B;
            --primary: #F59E0B;
            --text: #F8FAFC;
            --success: #10B981;
            --danger: #EF4444;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 480px; margin: 0 auto; }
        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.5rem; margin-left: 15px; color: var(--primary); }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--surface); padding: 15px; border-radius: 16px; border: 1px solid #334155; }
        .full { grid-column: span 2; border-left: 4px solid var(--primary); }
        .card span { font-size: 0.7rem; color: #94A3B8; text-transform: uppercase; letter-spacing: 1px; }
        .card strong { display: block; font-size: 1.3rem; margin-top: 5px; }
        .progress-bg { background: #334155; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: 1s ease; border-radius: 5px; }
        .btn-home { display: block; text-align: center; background: var(--primary); color: var(--bg); padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <a href="index.html" style="color:white; text-decoration:none; font-size: 1.5rem;">⬅</a>
        <h1>Dashboard Pro</h1>
    </header>

    <div class="grid-stats">
        <div class="card full">
            <span>Capital en la Calle</span>
            <strong id="stat-capital-calle">$0.00</strong>
        </div>
        <div class="card">
            <span>Intereses</span>
            <strong id="stat-intereses" style="color:var(--success)">+$0.00</strong>
        </div>
        <div class="card">
            <span>Cobrado Mes</span>
            <strong id="stat-cobrado-mes">$0.00</strong>
        </div>
        <div class="card">
            <span>En Mora</span>
            <strong id="stat-mora" style="color:var(--danger)">$0.00</strong>
        </div>
        <div class="card">
            <span>Activos</span>
            <strong id="stat-prestamos-activos">0</strong>
        </div>
        <div class="card">
            <span>Finalizados</span>
            <strong id="analisis-prestamos-finalizados">0</strong>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <span>Salud de Cartera</span>
            <span id="salud-porcentaje">0%</span>
        </div>
        <div class="progress-bg"><div id="salud-barra" class="progress-fill"></div></div>
    </div>

    <a href="index.html" class="btn-home">Ir al Menú Principal</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbmVXLBIsBzk-wE60yVtchZ8WI4NWnAW4",
        authDomain: "prestacom-sistema-a2830.firebaseapp.com",
        projectId: "prestacom-sistema-a2830",
        storageBucket: "prestacom-sistema-a2830.firebasestorage.app",
        messagingSenderId: "500739174929",
        appId: "1:500739174929:web:1694f07bf65714606f77b0"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const idEmpresa = localStorage.getItem('id_empresa');

    async function cargarEstadisticas() {
        const q = query(collection(db, "prestamos"), where("id_empresa", "==", idEmpresa));
        const snapshot = await getDocs(q);
        
        let capitalEnCalle = 0, intereses = 0, cobradoMes = 0, mora = 0, activos = 0, finalizados = 0;
        let v_total = 0, v_pagadas = 0;
        const hoy = new Date(); hoy.setHours(0,0,0,0);

        snapshot.forEach(doc => {
            const p = doc.data();
            if(p.status === 'Activo') activos++; else finalizados++;
            intereses += parseFloat(p.monto_interes || 0);

            if(p.cuotas_detalle) {
                p.cuotas_detalle.forEach(c => {
                    const montoCuota = parseFloat(c.monto_cuota || 0);
                    const abono = parseFloat(c.monto_abonado || 0);
                    const venc = new Date(c.fecha_vencimiento.split('-').reverse().join('-'));

                    if(p.status === 'Activo' && c.status !== 'Pagado') capitalEnCalle += (montoCuota - abono);
                    
                    if(p.status === 'Activo') {
                        if(venc < hoy) {
                            v_total++;
                            if(c.status === 'Pagado') v_pagadas++; else mora += (montoCuota - abono);
                        } else if(c.status === 'Pagado') { v_total++; v_pagadas++; }
                    }

                    if(c.fecha_pago) {
                        const [d, m, a] = c.fecha_pago.split('-');
                        if(parseInt(m) === hoy.getMonth()+1 && parseInt(a) === hoy.getFullYear()) {
                            cobradoMes += parseFloat(c.monto_ultimo_pago_dia || (c.status === 'Pagado' ? montoCuota : 0));
                        }
                    }
                });
            }
        });

        // Actualizar UI
        document.getElementById('stat-capital-calle').innerText = `$${capitalEnCalle.toLocaleString()}`;
        document.getElementById('stat-intereses').innerText = `+$${intereses.toLocaleString()}`;
        document.getElementById('stat-cobrado-mes').innerText = `$${cobradoMes.toLocaleString()}`;
        document.getElementById('stat-mora').innerText = `$${mora.toLocaleString()}`;
        document.getElementById('stat-prestamos-activos').innerText = activos;
        document.getElementById('analisis-prestamos-finalizados').innerText = finalizados;

        const salud = v_total > 0 ? (v_pagadas / v_total) * 100 : 100;
        const barra = document.getElementById('salud-barra');
        document.getElementById('salud-porcentaje').innerText = `${salud.toFixed(1)}%`;
        barra.style.width = `${salud}%`;
        barra.style.backgroundColor = salud < 70 ? 'var(--danger)' : 'var(--success)';
    }

    cargarEstadisticas();
</script>
</body>
</html>
