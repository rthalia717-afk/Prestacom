<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seleccionar Modalidad - PRESA FACIL</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background: #f1f5f9; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 90%; max-width: 400px; }
        button { padding: 40px; border-radius: 20px; border: 2px solid #0f172a; font-size: 1.2rem; font-weight: 900; cursor: pointer; color: white; }
        .b1 { background: #3B82F6; } .b2 { background: #10B981; }
        .b3 { background: #F59E0B; } .b4 { background: #8B5CF6; }
    </style>
</head>
<body>
    <h2>¿Qué desea cobrar hoy?</h2>
    <div class="grid">
        <!-- Al presionar DIARIO, llamamos a una función específica para diario.html -->
        <button class="b1" onclick="irADiario()">DIARIO</button>
        <button class="b2" onclick="sel(7, 'SEMANAL')">SEMANAL</button>
        <button class="b3" onclick="sel(15, 'QUINCENAL')">QUINCENAL</button>
        <button class="b4" onclick="sel(30, 'MENSUAL')">MENSUAL</button>
    </div>

    <script>
        // Función específica para el botón Diario
        function irADiario() {
            localStorage.setItem('mod_dias', 1);
            localStorage.setItem('mod_nombre', 'DIARIO');
            window.location.href = "diario.html";
        }

        // Función para los demás botones
        function sel(dias, nombre) {
            localStorage.setItem('mod_dias', dias);
            localStorage.setItem('mod_nombre', nombre);
            window.location.href = "cobros.html";
        }
    </script>
</body>
</html>
