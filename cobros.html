<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Cobros - PRESA-FACIL</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f1f5f9; padding-bottom: 80px; min-height: 100vh; position: relative; }
        
        header { 
            background: #111827; color: white; padding: 20px; display: flex; 
            align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .back-btn { color: white; text-decoration: none; font-size: 1.5rem; margin-right: 15px; }
        
        .container { padding: 20px; max-width: 500px; margin: auto; }
        h2 { color: #1e293b; margin-bottom: 10px; font-size: 1.2rem; text-align: center; }
        p { color: #64748b; text-align: center; margin-bottom: 30px; font-size: 0.9rem; }

        .grid-botones { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .btn-opcion { 
            background: white; border: 2px solid #e2e8f0; padding: 25px 10px; 
            border-radius: 15px; text-align: center; text-decoration: none; 
            color: #1e293b; font-weight: bold; transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center;
        }
        .btn-opcion:active { transform: scale(0.95); }
        .btn-opcion:hover { border-color: #f97316; color: #f97316; }
        .btn-opcion span { font-size: 2rem; margin-bottom: 5px; }

        /* Estilos para el nuevo botón */
        .footer-home {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .btn-inicio {
            background: #1e293b;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }
        .btn-inicio:hover { background: #f97316; }
    </style>
</head>
<body>

    <header>
        <a href="cobros.html" class="back-btn">⬅</a>
        <h1>Cobros</h1>
    </header>

    <div class="container">
        <h2>Selección de Cobro</h2>
        <p>Seleccione qué tipo de préstamo va a realizar el pago:</p>

        <div class="grid-botones">
            <a href="diario.html" class="btn-opcion">
                <span>⚡</span> Diarios
            </a>
            <a href="semanal.html" class="btn-opcion">
                <span>📅</span> Semanales
            </a>
            <a href="quincenal.html" class="btn-opcion">
                <span>🗓️</span> Quincenales
            </a>
            <a href="mensual.html" class="btn-opcion">
                <span>📆</span> Mensuales
            </a>
            
        </div>
    </div>

    <div class="footer-home">
        <a href="index.html" class="btn-inicio">Inicio</a>
    </div>

</body>
</html>
