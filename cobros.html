<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTACOM 2.0 - Diagnóstico</title>
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 15px; color: #334155; }
        .card-debug { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #cbd5e1; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h3 { margin-bottom: 5px; color: #1e293b; }
        pre { background: #1e293b; color: #f8fafc; padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 13px; }
        .info { background: #e0f2fe; padding: 10px; border-radius: 8px; color: #0369a1; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h2>🛠️ Modo Diagnóstico de Campos</h2>
    <p class="info">Sube este código temporal. Aquí abajo verás cómo están escritos tus datos internamente en Firebase. Dime qué campos te salen.</p>

    <div id="pantalla-debug">
        <p>Cargando estructura de datos...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5oHQtFWzLqY3JdpV_3pKY40rx00o6Gu4",
            authDomain: "prestacom-36ebd.firebaseapp.com",
            projectId: "prestacom-36ebd",
            storageBucket: "prestacom-36ebd.firebasestorage.app",
            messagingSenderId: "787618813060",
            appId: "1:787618813060:web:8bbdc1bea7960cdbad5ed1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const idEmpresaLogueada = localStorage.getItem('id_empresa');

        const q = query(
            collection(db, "clientes_prestamo"), 
            where("id_empresa", "==", idEmpresaLogueada)
        );

        onSnapshot(q, (snapshot) => {
            const contenedor = document.getElementById('pantalla-debug');
            contenedor.innerHTML = "";

            if (snapshot.empty) {
                contenedor.innerHTML = "<p>No se encontraron documentos en 'clientes_prestamo' para esta empresa.</p>";
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = "card-debug";
                
                // Mostramos el nombre del cliente y la estructura exacta de sus campos
                card.innerHTML = `
                    <h3>👤 Cliente: ${data.nombre || data.cliente || "Sin nombre explícito"}</h3>
                    <p><strong>Campos reales en tu base de datos:</strong></p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                contenedor.appendChild(card);
            });
        });
    </script>
</body>
</html>
